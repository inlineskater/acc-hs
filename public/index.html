<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Serce Ksiag - Cyberpunk PvE</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
:root{
  --bg:#f0f4ff;--bg2:#e6eaff;--bg3:#d5dbf5;
  --cyan:#0077bb;--purple:#6600bb;--pink:#bb0066;
  --amber:#aa6600;--green:#006633;
  --card-bg:#ffffff;--font:'Courier New',monospace;
  --glow-cyan:0 0 8px #0077bb66,0 0 18px #0077bb22;
  --glow-pink:0 0 8px #bb006666,0 0 18px #bb006622;
  --glow-amber:0 0 8px #aa660066,0 0 18px #aa660022;
  --red:#cc1111;--mana:#0077bb;
}
body{background:#e0e6ff;display:flex;align-items:center;justify-content:center;height:100dvh;font-family:var(--font);touch-action:manipulation;color:#1a1a3a}
#G{width:100vw;height:100dvh;max-width:420px;max-height:900px;background:var(--bg);overflow:hidden;display:flex;flex-direction:column;position:relative;color:#1a1a3a;border-radius:0}
@media(min-width:440px){#G{border-radius:16px;border:2px solid var(--cyan);box-shadow:var(--glow-cyan)}}
.scr{display:none;flex-direction:column;flex:1;overflow:hidden}.scr.on{display:flex}

/* ---- Glitch effect ---- */
@keyframes glitch{0%,100%{text-shadow:2px 0 var(--cyan),-2px 0 var(--pink)}25%{text-shadow:-2px 0 var(--cyan),2px 0 var(--pink)}50%{text-shadow:1px 1px var(--purple),-1px -1px var(--amber)}75%{text-shadow:-1px 0 var(--pink),1px 0 var(--cyan)}}
.glitch{animation:glitch 3s infinite}

/* ---- Lobby ---- */
#lobby{align-items:center;justify-content:flex-start;padding:12px 10px;background:var(--bg);gap:6px;overflow:hidden}
.logo{font-size:48px;filter:drop-shadow(0 0 12px #00ffff88);margin-top:8px}
.title{font-size:25px;font-weight:700;color:var(--cyan);letter-spacing:3px;text-transform:uppercase}
.sub{font-size:13px;color:#8899bb;text-align:center;line-height:1.5;max-width:320px}
.class-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:320px;width:100%}
.class-card{background:var(--bg3);border:2px solid #333;border-radius:10px;padding:10px;text-align:center;cursor:pointer;transition:all .2s}
.class-card:hover{border-color:var(--cyan);box-shadow:var(--glow-cyan)}
.class-card.sel{border-color:var(--pink);box-shadow:var(--glow-pink);background:#1a1030}
.cl-art{font-size:28px;margin-bottom:2px}
.cl-name{font-size:13px;font-weight:700;color:var(--cyan)}
.cl-hp{font-size:9px;color:var(--amber)}
.cl-desc{font-size:9px;color:#6677aa;margin-top:2px}
.mode-row{display:flex;flex-direction:column;gap:8px;max-width:320px;width:100%;align-items:center}
.mode-section{background:var(--bg3);border:1px solid #333;border-radius:10px;padding:10px 14px;width:100%}
.mode-label{font-size:12px;color:var(--amber);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.opt-row{display:flex;gap:6px;justify-content:center;margin-bottom:6px}
.opt-btn{width:40px;height:32px;border:2px solid #444;border-radius:6px;background:var(--bg2);color:#ccc;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;font-family:var(--font);transition:all .15s}
.opt-btn:hover{border-color:var(--cyan)}
.opt-btn.sel{border-color:var(--cyan);color:var(--cyan);box-shadow:var(--glow-cyan);background:#0a1a2e}
.start-btn{background:linear-gradient(135deg,#002233,#003344);border:2px solid var(--cyan);color:var(--cyan);font-size:15px;font-weight:700;padding:10px 28px;border-radius:8px;cursor:pointer;font-family:var(--font);letter-spacing:1px;transition:all .2s;text-shadow:var(--glow-cyan);text-transform:uppercase}
.start-btn:hover{background:#004455;box-shadow:var(--glow-cyan)}
.start-btn:disabled{background:#111;color:#444;border-color:#333;cursor:default;text-shadow:none;box-shadow:none}
.campaign-link{font-size:12px;color:var(--purple);cursor:pointer;opacity:.65;font-family:var(--font);letter-spacing:1px;border-bottom:1px solid #9b00ff44;transition:all .2s}
.campaign-link:hover{opacity:1;color:var(--pink);border-bottom-color:var(--pink)}
.diff-labels{display:flex;gap:6px;justify-content:center}
.diff-label{font-size:9px;color:#6677aa;width:40px;text-align:center}

/* ---- Campaign Map ---- */
#campaign-map{align-items:center;padding:10px 10px;background:var(--bg);gap:4px;overflow:hidden}
.cm-title{font-size:18px;color:var(--purple);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.cm-back{font-size:13px;color:var(--cyan);cursor:pointer;margin-bottom:4px;text-decoration:underline}
#campaign-nodes{display:grid;grid-template-columns:1fr 1fr;gap:5px;width:100%;max-width:340px;flex:1;min-height:0;overflow:hidden}
.campaign-node{background:var(--bg3);border:2px solid #333;border-radius:10px;padding:7px 10px;cursor:default;transition:all .2s;position:relative;overflow:hidden;font-size:13px}
.campaign-node.unlocked{border-color:var(--cyan);cursor:pointer}
.campaign-node.unlocked:hover{box-shadow:var(--glow-cyan);background:#0a1a2e}
.campaign-node.completed{border-color:var(--green);background:#0a1a0a}
.campaign-node.locked{opacity:.4;border-color:#222}
.campaign-node.locked::after{content:'ZABLOKOWANE';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;color:#ff4444;font-weight:700;letter-spacing:2px}
.cn-num{font-size:21px;font-weight:700;color:var(--cyan);display:inline-block;margin-right:8px}
.completed .cn-num{color:var(--green)}
.cn-title{font-size:13px;color:#ccc;display:inline}
.cn-rule{font-size:10px;color:var(--amber);margin-top:4px}
.cn-bots{font-size:10px;color:#6677aa;margin-top:2px}

/* ---- Chapter Intro ---- */
#chapter-intro{align-items:center;justify-content:center;padding:20px 14px;background:var(--bg);gap:12px}
.ci-box{background:var(--bg3);border:2px solid var(--purple);border-radius:12px;padding:16px;max-width:320px;text-align:center}
#ci-title{font-size:18px;color:var(--purple);font-weight:700;margin-bottom:8px}
#ci-story{font-size:13px;color:#aab;line-height:1.5;margin-bottom:8px}
#ci-rule{font-size:12px;color:var(--amber);background:#1a1800;border:1px solid var(--amber);border-radius:6px;padding:6px;margin-bottom:8px;display:none}
#ci-bots{font-size:12px;color:var(--cyan);margin-bottom:10px}
.ci-back{font-size:12px;color:var(--cyan);cursor:pointer;text-decoration:underline;margin-top:6px}

/* ---- Mulligan ---- */
#mulligan{align-items:center;justify-content:center;padding:20px 14px;background:var(--bg);gap:12px}
.mul-title{font-size:18px;color:var(--cyan);font-weight:700}
.mul-sub{font-size:12px;color:#8899bb}
#mulligan-cards{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;max-width:340px}
.selected-replace{outline:3px solid var(--pink)!important;box-shadow:var(--glow-pink)!important}

/* ---- Board ---- */
#board{flex:1;flex-direction:column;position:relative;overflow:hidden;
  background-image:linear-gradient(rgba(100,120,220,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(100,120,220,.07) 1px,transparent 1px);
  background-size:20px 20px;background-color:var(--bg)}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;background:var(--bg2);border-bottom:1px solid #222;z-index:10;min-height:36px;flex-shrink:0}
.bar-title{font-size:15px;color:var(--cyan);font-weight:700;letter-spacing:2px}
.bar-phase{font-size:11px;padding:2px 6px;border-radius:4px;font-weight:700;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-phase.yours{color:var(--green);border:1px solid var(--green)}
.bar-phase.theirs{color:var(--red);border:1px solid var(--red)}
.order-badge{font-size:11px;font-weight:700;color:var(--cyan);border:1px solid var(--cyan);border-radius:50%;width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.order-badge.active-turn{color:#fff;background:var(--cyan);border-color:var(--cyan)}
.eot-btn{background:linear-gradient(135deg,#1a0a0a,#2a1010);border:2px solid var(--amber);color:var(--amber);font-size:13px;font-weight:700;padding:5px 7px;border-radius:6px;cursor:pointer;font-family:var(--font);line-height:1.3;transition:all .2s;width:56px;text-align:center;flex-shrink:0}
.eot-btn:hover{box-shadow:var(--glow-amber);background:#2a1a00}
.eot-btn:disabled{opacity:.3;cursor:default;box-shadow:none}

/* ---- Enemy zones ---- */
#enemy-zones{display:flex;flex-direction:row;justify-content:space-around;align-items:flex-start;flex:1;min-height:0;overflow:hidden}
.enemy-zone{flex:1;display:flex;flex-direction:column;align-items:center;border-right:1px solid #bbc;padding:3px 3px;transition:background .3s;min-width:0}
/* Vertical layout for 3+ bots: heroes stacked left, boards on right */
#enemy-zones.vertical-layout{flex-direction:column;justify-content:flex-start;align-items:stretch}
#enemy-zones.vertical-layout .enemy-zone{flex-direction:row;border-right:none;border-bottom:1px solid #1a1a2e;align-items:center;padding:4px 0;min-height:84px}
#enemy-zones.vertical-layout .hero-area{flex-direction:column;width:78px;flex-shrink:0;padding:2px 4px;border-right:1px solid #2a2a4e;align-items:center;justify-content:center}
#enemy-zones.vertical-layout .minion-row{flex:1;min-height:74px;flex-wrap:nowrap;overflow:visible;padding:0 4px}
/* Player zone matching the vertical layout style */
#player-zone{flex-shrink:0;display:flex;flex-direction:column;background:var(--bg)}
#player-row{display:flex;flex-direction:row;border-top:1px solid #2a2a4e;min-height:84px}
#player-hero-col{width:78px;flex-shrink:0;border-right:1px solid #2a2a4e;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px 4px;gap:2px;background:var(--bg)}
#player-board-col{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);overflow:visible;padding:0 4px}
#player-row .minion-row{min-height:74px;overflow:visible;flex-wrap:wrap;justify-content:center;align-items:center}
/* Hide scrollbars on hand (still scrollable) */
.hand-area{scrollbar-width:none;-ms-overflow-style:none;background:var(--bg2)}
.hand-area::-webkit-scrollbar{display:none}
/* Compact minion rows for multi-bot */
#enemy-zones .minion-row{min-height:40px}
.enemy-zone:last-child{border-right:none}
.enemy-zone.active-bot{background:#e0e8ff}
.hand-backs-row{display:flex;gap:2px;flex-wrap:wrap;justify-content:center}
.bck{width:10px;height:14px;background:var(--purple);border-radius:2px;border:1px solid #6a00aa;opacity:.6}
.hero-area{display:flex;flex-direction:column;align-items:center;gap:3px;padding:2px 0;width:100%}
.hero-port{width:38px;height:38px;border-radius:50%;border:2px solid #99a;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;background:#fff;transition:all .2s;flex-shrink:0}
.hero-port.attackable{border-color:var(--red);box-shadow:0 0 8px #ff444466}
.hero-port.can-hero-atk{border-color:var(--amber);box-shadow:var(--glow-amber)}
.hero-hp{position:absolute;bottom:-4px;right:-4px;background:var(--red);color:#fff;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid #fff}
.hero-armor{position:absolute;bottom:-4px;left:-4px;background:#4488ff;color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid #88aaff}


/* ---- Player zone ---- */
.player-hero-area{display:flex;align-items:center;justify-content:space-between;padding:4px 12px;gap:8px}
.my-hero-center{display:flex;flex-direction:column;align-items:center;gap:1px;flex:1}
.my-hero-port{width:48px;height:48px;border-radius:50%;border:2px solid #99a;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;background:#fff;transition:all .2s;flex-shrink:0}
.my-hero-port.can-hero-atk{border-color:var(--amber);box-shadow:var(--glow-amber);cursor:pointer}
.my-hero-port.sel-hero{border-color:var(--pink);box-shadow:var(--glow-pink)}
.hp-gem{width:40px;height:40px;border-radius:50%;border:2px solid #444;background:var(--bg3);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.hp-gem:hover:not(:disabled):not(.used){border-color:var(--cyan);box-shadow:var(--glow-cyan)}
.hp-gem.used{opacity:.3;cursor:default}
.hp-gem.active{border-color:var(--pink);box-shadow:var(--glow-pink)}
.hp-art{font-size:16px}
.hp-cost{font-size:9px;color:var(--mana)}
.wpn-slot{width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wpn-card{position:relative;width:32px;height:32px;border-radius:6px;border:2px solid var(--amber);background:var(--bg3);display:flex;align-items:center;justify-content:center}
.wpn-art{font-size:16px}
.wpn-atk{position:absolute;bottom:-3px;left:-3px;background:var(--amber);color:#000;font-size:9px;font-weight:700;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.wpn-dur{position:absolute;bottom:-3px;right:-3px;background:#888;color:#fff;font-size:9px;font-weight:700;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.mana-txt{font-size:14px;color:var(--mana);font-weight:700;flex-shrink:0;text-align:center}
.hero-info{display:flex;flex-direction:column;gap:1px;align-items:center}
.hero-cls-name{font-size:14px;color:var(--cyan)}
.deck-info{font-size:10px;color:#6677aa}

/* ---- Minion row ---- */
.battle-zone{padding:4px 4px;min-height:72px}
.minion-row{display:flex;gap:6px;justify-content:center;align-items:center;min-height:68px;flex-wrap:wrap}

/* ---- Oval/Shield minions ---- */
.minion-wrap{position:relative;display:inline-flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .15s}
.minion-wrap:hover{transform:scale(1.05)}
.minion{width:60px;height:70px;clip-path:ellipse(45% 48% at 50% 50%);background:#fff;border:2px solid #ccd;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.minion::before{content:'';position:absolute;inset:-2px;z-index:-1;clip-path:ellipse(45% 48% at 50% 50%);background:var(--cyan);opacity:0;transition:opacity .2s}
.minion-wrap.taunt .minion{clip-path:polygon(15% 0%,85% 0%,100% 35%,85% 100%,50% 88%,15% 100%,0% 35%)}
.minion-wrap.taunt .minion::before{clip-path:polygon(15% 0%,85% 0%,100% 35%,85% 100%,50% 88%,15% 100%,0% 35%)}
.minion-wrap.can-atk .minion::before{opacity:1;background:var(--amber)}
.minion-wrap.sel .minion::before{opacity:1;background:var(--pink)}
.minion-wrap.targeted .minion::before{opacity:1;background:var(--red)}
.minion-wrap.taunt .minion::before{opacity:.6;background:#3a6aff}
.minion-wrap.healable .minion::before{opacity:.5;background:var(--green)}
.minion-wrap.legendary-wrap .minion{background:linear-gradient(135deg,#fffde0,#fff8c0)}
.minion-wrap.legendary-wrap{filter:drop-shadow(0 0 6px #ffd700)}
.minion.divine-shield{box-shadow:inset 0 0 12px #ffff0066}
.minion.damaged{}
.m-cost{position:absolute;top:2px;left:2px;font-size:10px;font-weight:700;color:#fff;background:#1177ee;width:16px;height:16px;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);display:flex;align-items:center;justify-content:center;z-index:2}
.m-art{font-size:22px;margin-top:4px}
.m-atk{position:absolute;bottom:-8px;left:-2px;background:var(--amber);color:#000;font-size:12px;font-weight:700;width:20px;height:20px;clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);display:flex;align-items:center;justify-content:center;z-index:5}
.m-hp{position:absolute;bottom:-8px;right:-2px;background:var(--red);color:#fff;font-size:12px;font-weight:700;width:20px;height:20px;clip-path:polygon(50% 0%,80% 20%,100% 55%,85% 85%,50% 100%,15% 85%,0% 55%,20% 20%);display:flex;align-items:center;justify-content:center;z-index:5}
.m-hp.hurt{background:#ff0000;animation:pulse-hp .6s infinite}
@keyframes pulse-hp{0%,100%{box-shadow:0 0 4px #ff0000}50%{box-shadow:0 0 10px #ff0000}}
.dr-badge{position:absolute;top:-4px;right:-4px;font-size:12px;z-index:5}
.eot-badge{position:absolute;top:-4px;left:-4px;font-size:12px;z-index:5}
.combo-badge{position:absolute;top:50%;left:-6px;font-size:10px;z-index:5;transform:translateY(-50%)}
.ds-indicator{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px;z-index:3;filter:drop-shadow(0 0 6px #ffff00)}

/* ---- Hand ---- */
.hand-area{padding:4px 4px 6px;overflow-x:auto;flex-shrink:0}
.hand-row{display:flex;gap:5px;justify-content:center;min-height:114px;align-items:flex-end}

/* ---- Hand cards (Hearthstone rectangle style) ---- */
@keyframes legendary-shimmer{0%,100%{box-shadow:0 0 6px #ffd700,0 0 16px #ffd70055}50%{box-shadow:0 0 14px #ffd700,0 0 32px #ffd700aa}}
.hand-card{width:72px;height:104px;background:#fff;border-radius:8px;border:2px solid #bbc;display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;transition:transform .15s,box-shadow .15s;flex-shrink:0}
.hand-card.playable{border-color:var(--green);box-shadow:0 0 6px #00663344}
.hand-card.playable:hover{transform:translateY(-10px) scale(1.06);box-shadow:0 0 14px var(--green)}
.hand-card.spell{background:#f5f0ff;border-color:var(--purple)}
.hand-card.weapon-card{background:#fff8ec;border-color:var(--amber)}
.hand-card.legendary{animation:legendary-shimmer 2s ease-in-out infinite;border-color:#aa8800}
/* Mana diamond badge */
.hand-card .hc-cost{position:absolute;top:2px;left:2px;font-size:14px;font-weight:900;color:#fff;width:24px;height:24px;display:flex;align-items:center;justify-content:center;z-index:2;background:#1177ee;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);filter:drop-shadow(0 0 4px #1177ee)}
.hand-card .hc-art{font-size:26px;margin-top:10px;flex-shrink:0;line-height:1}
.hand-card .hc-name{font-size:13px;color:#1a1a3a;text-align:center;width:66px;margin-top:3px;font-weight:700;background:#fffd;padding:1px 3px;line-height:1.2;word-break:break-word}
.hand-card .hc-type{font-size:10px;color:#556;margin-top:1px;text-align:center}
/* Description tooltip: hidden, pointer-events none (used in mulligan screen) */
.hand-card .hc-desc{display:none;pointer-events:none}
/* ATK badge: pentagon/sword shape */
.hand-card .hc-atk{position:absolute;bottom:4px;left:3px;font-size:13px;font-weight:700;color:#000;background:var(--amber);width:22px;height:22px;clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);display:flex;align-items:center;justify-content:center}
/* HP badge: blood drop teardrop shape */
.hand-card .hc-hp{position:absolute;bottom:4px;right:3px;font-size:13px;font-weight:700;color:#fff;background:var(--red);width:22px;height:22px;clip-path:polygon(50% 0%,80% 20%,100% 55%,85% 85%,50% 100%,15% 85%,0% 55%,20% 20%);display:flex;align-items:center;justify-content:center}

/* ---- Log bar ---- */
.log-bar{font-size:14px;color:#445080;padding:3px 8px;text-align:center;background:var(--bg2);border-top:1px solid #bbc;flex-shrink:0;min-height:20px}

/* ---- Turn banner ---- */
.turn-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:23px;font-weight:700;letter-spacing:4px;text-transform:uppercase;padding:10px 30px;border-radius:8px;z-index:200;pointer-events:none;opacity:0;transition:opacity .3s}
.turn-banner.show{opacity:1;animation:banner-in .6s ease-out}
@keyframes banner-in{0%{transform:translate(-50%,-50%) scale(2);opacity:0}50%{opacity:1}100%{transform:translate(-50%,-50%) scale(1)}}
.turn-banner.yours{color:var(--green);background:#e8fff4ee;border:2px solid var(--green);box-shadow:0 0 20px #00663344}
.turn-banner.theirs{color:var(--red);background:#fff0f0ee;border:2px solid var(--red);box-shadow:0 0 20px #cc111144}

/* ---- Spell overlay ---- */
.spell-overlay{position:absolute;top:0;left:0;right:0;background:var(--bg2);border-bottom:2px solid var(--pink);padding:6px 10px;z-index:100;display:none;align-items:center;justify-content:space-between;font-size:13px;color:var(--pink)}
.spell-overlay.show{display:flex}
.spell-overlay button{background:var(--bg3);border:1px solid var(--pink);color:var(--pink);padding:3px 8px;border-radius:4px;cursor:pointer;font-family:var(--font);font-size:12px}

/* ---- Damage/heal popups ---- */
.dmg-pop{position:absolute;z-index:150;font-size:18px;font-weight:700;pointer-events:none;animation:pop-up .8s ease-out forwards}
.dmg-pop.dmg{color:var(--red);text-shadow:0 0 8px #ff000088}
.dmg-pop.heal{color:var(--green);text-shadow:0 0 8px #00ff8888}
@keyframes pop-up{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-30px)}}

/* ---- Attack flash ---- */
@keyframes atk-flash-anim{0%,100%{filter:brightness(1)}50%{filter:brightness(2)}}
.atk-flash{animation:atk-flash-anim .25s}


/* ---- Game Over ---- */
#goov{display:none;position:absolute;inset:0;z-index:300;align-items:center;justify-content:center;flex-direction:column}
#goov.win-bg{background:radial-gradient(circle,#001a0acc,#000a)}
#goov.lose-bg{background:radial-gradient(circle,#1a0000cc,#000a)}
.goc{background:var(--bg3);border:2px solid var(--cyan);border-radius:12px;padding:20px;text-align:center;max-width:300px;display:flex;flex-direction:column;gap:6px;align-items:center}
.got{font-size:25px;font-weight:700}
.got.win{color:var(--green);text-shadow:0 0 12px #00ff8866}
.got.lose{color:var(--red);text-shadow:0 0 12px #ff444466}
.go-sub{font-size:13px;color:#aab}
</style>

  var r = el.getBoundingClientRect();
  tip.style.left = (r.left + r.width / 2) + 'px';
  tip.style.top = (r.top - 8) + 'px';
  tip.style.transform = 'translate(-50%, -100%)';
}
function hideCardTip() {
  var tip = document.getElementById('card-tip');

function uid() { return Math.random().toString(36).slice(2, 8); }

function cloneCard(c) {
  return { ...c, uid: uid(), curHp: c.hp ?? 1, maxHp: c.hp ?? 1, canAtk: false, fresh: true,
    divineShield: c.keywords?.includes("divine_shield") };
}

function shuffle(a) {
  const b = [...a];
  for (let i = b.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1)); [b[i],b[j]] = [b[j],b[i]];
  }
  return b;
}

function buildDeck(cls) {
  const pool = CLASSES[cls].cards;
  const standards = pool.filter(c => !c.legendary);
  const legendary = pool.find(c => c.legendary);
  const targetSize = 15;
  const extraCount = Math.max(0, targetSize - standards.length - 1);
  const extra = shuffle(standards).slice(0, extraCount);
  return shuffle([...standards, ...extra, legendary]).map(c => cloneCard(c));
}

function hasTaunt(board) {
  return board.some(c => !c.silenced && c.keywords?.includes("taunt"));
}

function mkPlayer(id, cls, botLevel, hp) {
  if (botLevel === undefined) botLevel = 0;
  if (hp === undefined) hp = 15;
  return { id:id, hp:hp, maxHp:hp, maxMana:1, mana:1, armor:0,
    deck:buildDeck(cls), hand:[], board:[], weapon:null, cls:cls,
    heroPowerUsed:false, canHeroAtk:false, heroAtkVal:0,
    playedThisTurn:false, fatigue:0, mulliganDone:false, botLevel:botLevel, turnsPlayed:0 };
}

function drawCards(p, n) {
  if (n === undefined) n = 1;
  for (let i=0; i<n; i++) {
    if (p.deck.length > 0 && p.hand.length < 4) {
      p.hand.push(p.deck.shift());
    } else if (p.deck.length === 0) {
      p.fatigue++;
      p.hp -= p.fatigue;
      var idx = G.playerOrder.indexOf(p.id);
      if (idx !== -1) pendingEvents.push({ kind:'damage', targetId:'hero_'+idx, amount:p.fatigue });
    }
  }
}

// ======================================================================
// EFFECT FUNCTIONS
// ======================================================================
function dealDamageToHero(p, amount) {
  var absorbed = Math.min(p.armor, amount);
  p.armor -= absorbed;
  var actual = amount - absorbed;
  p.hp -= actual;
  var idx = G.playerOrder.indexOf(p.id);
  if (idx !== -1) pendingEvents.push({ kind:'damage', targetId:'hero_'+idx, amount: actual > 0 ? actual : amount });
}

function healHero(p, amount) {
  var actual = Math.min(p.maxHp - p.hp, amount);
  p.hp += actual;
  if (actual > 0) {
    var idx = G.playerOrder.indexOf(p.id);
    if (idx !== -1) pendingEvents.push({ kind:'heal', targetId:'hero_'+idx, amount:actual });
  }
}

function healMinion(m, amount) {
  var actual = Math.min(m.maxHp - m.curHp, amount);
  m.curHp += actual;
  if (actual > 0) pendingEvents.push({ kind:'heal', targetId:m.uid, amount:actual });
}

function minionCombat(a, d) {
  if (d.divineShield) d.divineShield = false;
  else { d.curHp -= a.atk??0; pendingEvents.push({ kind:'damage', targetId:d.uid, amount:a.atk??0 }); }
  if (a.divineShield) a.divineShield = false;
  else { a.curHp -= d.atk??0; pendingEvents.push({ kind:'damage', targetId:a.uid, amount:d.atk??0 }); }
  a.canAtk = false;
}

function resolveHealTarget(me, allEnemies, targetUid, targetType, targetOwnerId) {
  if (targetType === 'hero_me') return me;
  if (targetType === 'hero_opp') return targetOwnerId ? G.players[targetOwnerId] : allEnemies[0];
  if (targetType === 'minion_me') return me.board.find(function(m){return m.uid===targetUid}) ?? null;
  if (targetType === 'minion_opp') {
    for (var ei=0; ei<allEnemies.length; ei++) { var m = allEnemies[ei].board.find(function(m){return m.uid===targetUid}); if (m) return m; }
  }
  return null;
}

function applyBattlecry(card, me, allEnemies, targetUid, targetType, targetOwnerId) {
  var opp = targetOwnerId ? G.players[targetOwnerId] : allEnemies[0];
  switch (card.battlecry) {
    case "deal1":
      if (targetType === 'minion_opp' && targetUid && opp) {
        var def = opp.board.find(function(c){return c.uid===targetUid});
        if (def) { def.curHp -= 1; pendingEvents.push({ kind:'damage', targetId:def.uid, amount:1 }); }
      } else if (targetType === 'minion_me') {
        var def2 = me.board.find(function(c){return c.uid===targetUid});
        if (def2) { def2.curHp -= 1; pendingEvents.push({ kind:'damage', targetId:def2.uid, amount:1 }); }
      } else if (opp) dealDamageToHero(opp, 1);
      break;
    case "deal2":
      if (targetType === 'minion_opp' && targetUid && opp) {
        var def3 = opp.board.find(function(c){return c.uid===targetUid});
        if (def3) { def3.curHp -= 2; pendingEvents.push({ kind:'damage', targetId:def3.uid, amount:2 }); }
      } else if (opp) dealDamageToHero(opp, 2);
      break;
    case "deal1all":
      allEnemies.forEach(function(e) {
        e.board.forEach(function(c) { c.curHp -= 1; pendingEvents.push({ kind:'damage', targetId:c.uid, amount:1 }); });
        dealDamageToHero(e, 1);
      }); break;
    case "deal1all_draw1":
      allEnemies.forEach(function(e) {
        e.board.forEach(function(c) { c.curHp -= 1; pendingEvents.push({ kind:'damage', targetId:c.uid, amount:1 }); });
        dealDamageToHero(e, 1);
      });
      drawCards(me, 1); break;
    case "draw1": drawCards(me, 1); break;
    case "armor2": me.armor += 2; break;
    case "armor3": me.armor += 3; break;
    case "armor4": me.armor += 4; break;
    case "heal2self": healHero(me, 2); break;
    case "heal2target": {
      var t = resolveHealTarget(me, allEnemies, targetUid, targetType, targetOwnerId);
      if (t) { if ('maxMana' in t) healHero(t, 2); else healMinion(t, 2); } break;
    }
    case "heal4target": {
      var t2 = resolveHealTarget(me, allEnemies, targetUid, targetType, targetOwnerId);
      if (t2) { if ('maxMana' in t2) healHero(t2, 4); else healMinion(t2, 4); } break;
    }
    case "deal_random_1": {
      var allTargets = [...me.board, ...allEnemies.flatMap(function(e){return e.board})];
      if (allTargets.length > 0 && Math.random() < 0.7) {
        var t3 = allTargets[Math.floor(Math.random()*allTargets.length)];
        t3.curHp -= 1; pendingEvents.push({ kind:'damage', targetId:t3.uid, amount:1 });
      } else if (allEnemies[0]) dealDamageToHero(allEnemies[0], 1);
      break;
    }
  }
}

function applySpell(card, me, allEnemies, targetUid, targetType, targetOwnerId) {
  var opp = targetOwnerId ? G.players[targetOwnerId] : allEnemies[0];
  var eff = card.spellEffect;
  switch (eff) {
    case "deal4face":
      if (targetType === 'minion_opp' && targetUid && opp) {
        var def = opp.board.find(function(c){return c.uid===targetUid});
        if (def) { def.curHp -= 4; pendingEvents.push({ kind:'damage', targetId:def.uid, amount:4 }); }
      } else if (targetType === 'minion_me') {
        var def2 = me.board.find(function(c){return c.uid===targetUid});
        if (def2) { def2.curHp -= 4; pendingEvents.push({ kind:'damage', targetId:def2.uid, amount:4 }); }
      } else if (opp) dealDamageToHero(opp, 4);
      break;
    case "deal2all":
      allEnemies.forEach(function(e) {
        e.board.forEach(function(c) { c.curHp -= 2; pendingEvents.push({ kind:'damage', targetId:c.uid, amount:2 }); });
        dealDamageToHero(e, 2);
      }); break;
    case "deal3all":
      allEnemies.forEach(function(e) {
        e.board.forEach(function(c) { c.curHp -= 3; pendingEvents.push({ kind:'damage', targetId:c.uid, amount:3 }); });
      }); break;
    case "draw2": drawCards(me, 2); break;
    case "armor4": me.armor += 4; break;
    case "armor6": me.armor += 6; break;
    case "mana1": me.mana = Math.min(me.mana+1, 10); break;
    case "heal2self": healHero(me, 2); break;
    case "heal2all": me.board.forEach(function(m){healMinion(m, 2)}); healHero(me, 2); break;
    case "heal6target": {
      var t = resolveHealTarget(me, allEnemies, targetUid, targetType, targetOwnerId);
      if (t) { if ('maxMana' in t) healHero(t, 6); else healMinion(t, 6); } break;
    }
    case "deal_random_1_3": {
      var dmg = 1 + Math.floor(Math.random() * 3);
      var allEnemyMinions = allEnemies.flatMap(function(e){return e.board});
      if (allEnemyMinions.length > 0 && Math.random() < 0.5) {
        var ts = allEnemyMinions[Math.floor(Math.random() * allEnemyMinions.length)];
        ts.curHp -= dmg; pendingEvents.push({ kind:'damage', targetId:ts.uid, amount:dmg });
      } else if (allEnemies[0]) dealDamageToHero(allEnemies[0], dmg);
      break;
    }
    case "buff_random_friendly_2_2": {
      var targets = me.board;
      if (targets.length) {
        var tb = targets[Math.floor(Math.random()*targets.length)];
        tb.atk=(tb.atk??0)+2; tb.curHp+=2; tb.maxHp+=2;
      }
      break;
    }
    case "reduce_random_hand_cost_1": {
      if (me.hand.length) {
        var tc = me.hand[Math.floor(Math.random()*me.hand.length)];
        tc.cost = Math.max(0, tc.cost-1);
      }
      break;
    }
    case "heal_random_2_4": {
      var targetsH = me.board.slice();
      if (targetsH.length) {
        var th = targetsH[Math.floor(Math.random()*targetsH.length)];
        var amt = 2 + Math.floor(Math.random()*3);
        healMinion(th, amt);
      } else healHero(me, 2+Math.floor(Math.random()*3));
      break;
    }
  }
}

function applyCombo(card, me, allEnemies) {
  var opp = allEnemies[0];
  switch (card.combo) {
    case 'deal1': if (opp) dealDamageToHero(opp, 1); break;
    case 'deal2': if (opp) dealDamageToHero(opp, 2); break;
    case 'deal3': if (opp) dealDamageToHero(opp, 3); break;
    case 'draw1': drawCards(me, 1); break;
  }
}

function applyDeathrattle(card, owner, allEnemies) {
  var enemy = allEnemies[0];
  switch (card.deathrattle) {
    case 'deal2random': {
      var allEnemyMinions = allEnemies.flatMap(function(e){return e.board});
      if (allEnemyMinions.length) {
        var t = allEnemyMinions[Math.floor(Math.random()*allEnemyMinions.length)];
        t.curHp -= 2; pendingEvents.push({ kind:'damage', targetId:t.uid, amount:2 });
      } else if (enemy) dealDamageToHero(enemy, 2);
      break;
    }
    case 'armor3': owner.armor += 3; break;
    case 'draw1': drawCards(owner, 1); break;
    case 'heal3self': {
      owner.hp = Math.min(owner.maxHp, owner.hp+3);
      var idx = G.playerOrder.indexOf(owner.id);
      pendingEvents.push({ kind:'heal', targetId:'hero_'+idx, amount:3 });
      break;
    }
  }
}

function applyEndOfTurnEffects(me, allEnemies) {
  me.board.forEach(function(c) {
    if (!c.endOfTurn || c.silenced) return;
    switch (c.endOfTurn) {
      case 'deal1random': {
        var allEnemyMinions = allEnemies.flatMap(function(e){return e.board});
        if (allEnemyMinions.length) {
          var t = allEnemyMinions[Math.floor(Math.random()*allEnemyMinions.length)];
          t.curHp -= 1; pendingEvents.push({ kind:'damage', targetId:t.uid, amount:1 });
        } else if (allEnemies[0]) dealDamageToHero(allEnemies[0], 1);
        break;
      }
      case 'buff1_0': {
        var friends = me.board.filter(function(f){return f.uid !== c.uid});
        if (friends.length) { var t2 = friends[Math.floor(Math.random()*friends.length)]; t2.atk = (t2.atk??0)+1; }
        break;
      }
      case 'heal1self': {
        me.hp = Math.min(me.maxHp, me.hp+1);
        var idx = G.playerOrder.indexOf(me.id);
        pendingEvents.push({ kind:'heal', targetId:'hero_'+idx, amount:1 });
        break;
      }
      case 'heal2self': {
        me.hp = Math.min(me.maxHp, me.hp+2);
        var idx2 = G.playerOrder.indexOf(me.id);
        pendingEvents.push({ kind:'heal', targetId:'hero_'+idx2, amount:2 });
        break;
      }
      case 'buff_random_enemy_minus1': {
        var allEnemyMinions = allEnemies.flatMap(function(e){return e.board});
        if (allEnemyMinions.length) {
          var te = allEnemyMinions[Math.floor(Math.random()*allEnemyMinions.length)];
          te.atk = Math.max(0, (te.atk??0)-1);
        }
        break;
      }
      case 'gain_atk_random_1_2': {
        var bonus = 1 + Math.floor(Math.random()*2);
        c.atk = (c.atk??0) + bonus;
        break;
      }
      case 'heal_or_damage_random': {
        if (Math.random() < 0.6) {
          var friends = me.board.slice();
          if (friends.length) { var tf=friends[Math.floor(Math.random()*friends.length)]; healMinion(tf,2); }
          else healHero(me, 2);
        } else {
          var allEnemyMins = allEnemies.flatMap(function(e){return e.board});
          if (allEnemyMins.length) {
            var td=allEnemyMins[Math.floor(Math.random()*allEnemyMins.length)];
            td.curHp-=1; pendingEvents.push({ kind:'damage', targetId:td.uid, amount:1 });
          } else if (allEnemies[0]) dealDamageToHero(allEnemies[0], 1);
        }
        break;
      }
    }
  });
}

function checkDead(allPlayers) {
  var changed = true, iter = 0;
  while (changed && iter++ < 10) {
    changed = false;
    allPlayers.forEach(function(p) {
      var dead = p.board.filter(function(c){return c.curHp <= 0});
      if (dead.length) {
        changed = true;
        p.board = p.board.filter(function(c){return c.curHp > 0});
        dead.forEach(function(c) {
          if (c.deathrattle && !c.silenced) {
            var allEnemies = allPlayers.filter(function(e){return e.id !== p.id});
            applyDeathrattle(c, p, allEnemies);
          }
        });
      }
    });
  }
}

function checkWin() {
  var human = G.players[myId];
  if (!human || human.hp <= 0) {
    G.phase = 'over'; G.winner = 'bots';
    G.log = 'Urz\u0105d Skarbowy przej\u0105\u0142 kontrol\u0119!'; return;
  }
  var livingBots = G.playerOrder.filter(function(id){return id !== myId && G.players[id] && G.players[id].hp > 0});
  if (livingBots.length === 0) {
    G.phase = 'over'; G.winner = 'human';
    G.log = 'Zwyci\u0119stwo! Twoje ksi\u0119gi s\u0105 bezbł\u0119dne.';
  }
}

function eliminatePlayer(id) {
  G.playerOrder = G.playerOrder.filter(function(pid){return pid !== id});
  var p = G.players[id];
  G.log = (p && p.cls ? (CLASSES[p.cls]?.cls || p.cls) : 'Bot') + ' wyeliminowany!';
}

function getNextLivingPlayer(currentId) {
  var idx = G.playerOrder.indexOf(currentId);
  if (idx === -1 || G.playerOrder.length === 0) return myId;
  return G.playerOrder[(idx+1) % G.playerOrder.length];
}

// ======================================================================
// ACTION HANDLERS
// ======================================================================
function action_joinGame(humanCls, botCount, diffLevel, campaignChapter) {
  G = { phase:"waiting", players:{}, playerOrder:[], activePlayer:"", turn:1, winner:null, log:"" };
  pendingEvents = [];
  myId = "human";
  currentCampaignChapter = campaignChapter || null;

  var human = mkPlayer(myId, humanCls, 0);
  G.players[myId] = human;
  G.playerOrder.push(myId);

  if (campaignChapter) {
    campaignChapter.bots.forEach(function(botDef) {
      var botId = 'bot_' + uid();
      var botP = mkPlayer(botId, botDef.cls, botDef.level, botDef.isBoss ? 30 : 15);
      botP.mulliganDone = true;
      G.players[botId] = botP;
      G.playerOrder.push(botId);
      if (botDef.isBoss) {
        for (var j=0; j<3; j++) {
          var m = { id:'kontroler'+j, name:'Kontroler Podatk\u00F3w', art:'\uD83D\uDC6E', cost:3, type:'minion',
            atk:2, hp:3, uid:uid(), curHp:3, maxHp:3, canAtk:false, fresh:true };
          botP.board.push(m);
        }
      }
    });
  } else {
    for (var i=0; i<botCount; i++) {
      var botId = 'bot_' + uid();
      var botCls = ALL_CLASSES[Math.floor(Math.random()*4)];
      var botP = mkPlayer(botId, botCls, diffLevel);
      botP.mulliganDone = true;
      G.players[botId] = botP;
      G.playerOrder.push(botId);
    }
  }

  // Randomize turn order — human can go first, second, third, etc.
  G.playerOrder = shuffle(G.playerOrder);

  G.phase = "mulligan";
  G.playerOrder.forEach(function(id, i) {
    drawCards(G.players[id], 3);
    // Position i (0-indexed): player at position i gets i coins (0 for first, 1 for second, etc.)
    for (var ci = 0; ci < i; ci++) {
      var coin = cloneCard({ id:"coin", name:"Moneta", art:"\uD83E\uDE99", cost:0, type:"spell",
        spellEffect:"mana1", spellText:"Zyskaj 1 man\u0119 w tej turze." });
      G.players[id].hand.unshift(coin);
    }
  });
  G.log = "Wymie\u0144 karty przed gr\u0105!";
  pendingEvents = [];
  showScreen('mulligan');
  renderMulligan();
}

function action_mulligan(replaceUids) {
  var me = G.players[myId];
  var toReplace = me.hand.filter(function(c){return replaceUids.indexOf(c.uid)!==-1 && c.id !== 'coin'});
  me.hand = me.hand.filter(function(c){return toReplace.indexOf(c)===-1});
  toReplace.forEach(function(c){ me.deck.push(cloneCard(c)); });
  me.deck = shuffle(me.deck);
  drawCards(me, toReplace.length);
  me.mulliganDone = true;
  startPlaying();
}

function startPlaying() {
  G.phase = "playing";
  G.activePlayer = G.playerOrder[0]; // Use randomized first player
  G.turn = 1;
  G.playerOrder.forEach(function(id) {
    G.players[id].maxMana = 1; G.players[id].mana = 1;
    G.players[id].board.forEach(function(c) { c.canAtk = false; c.fresh = true; });
  });
  pendingEvents = [];
  showScreen('board');
  setTimeout(function(){ setupCanvas(); }, 50);
  if (G.activePlayer === myId) {
    G.log = "Gra rozpocz\u0119ta! Twoja tura.";
    showTurnBanner("TWOJA TURA", true);
    render();
  } else {
    var firstBot = G.players[G.activePlayer];
    var BOT_NAMES = ['','\u017B\u00F3\u0142todziob','Normalny','Trudny','Ekspert'];
    G.log = 'Bot (' + BOT_NAMES[firstBot.botLevel] + ') zaczyna gr\u0119!';
    render();
    setTimeout(function(){ runBotTurn(G.activePlayer, 0); }, 900);
  }
}

function action_playCard(cardUid, targetUid, targetType, targetOwnerId) {
  if (G.phase !== 'playing' || G.activePlayer !== myId) return;
  var me = G.players[myId];
  var allEnemies = G.playerOrder.filter(function(id){return id!==myId}).map(function(id){return G.players[id]});
  var idx = me.hand.findIndex(function(c){return c.uid===cardUid});
  if (idx === -1) return;
  var card = me.hand[idx];
  if (me.mana < card.cost) return;
  var hadPlayed = me.playedThisTurn;
  me.mana -= card.cost; me.hand.splice(idx, 1); me.playedThisTurn = true;

  if (card.type === 'minion') {
    if (me.board.length >= 4) { me.hand.splice(idx, 0, card); me.mana += card.cost; me.playedThisTurn = hadPlayed; return; }
    card.canAtk = !!(card.keywords && card.keywords.indexOf("charge")!==-1);
    card.fresh = !(card.keywords && card.keywords.indexOf("charge")!==-1);
    me.board.push(card);
    applyBattlecry(card, me, allEnemies, targetUid, targetType, targetOwnerId);
    if (hadPlayed && card.combo) applyCombo(card, me, allEnemies);
    G.log = (CLASSES[me.cls]?.cls??me.cls) + ': zagrano ' + card.name;
  } else if (card.type === 'spell') {
    applySpell(card, me, allEnemies, targetUid, targetType, targetOwnerId);
    G.log = (CLASSES[me.cls]?.cls??me.cls) + ': czar ' + card.name;
  } else if (card.type === 'weapon') {
    me.weapon = { uid:uid(), name:card.name, art:card.art, atk:card.weaponAtk, durability:card.durability, cost:card.cost };
    me.heroAtkVal = card.weaponAtk; me.canHeroAtk = true;
    G.log = (CLASSES[me.cls]?.cls??me.cls) + ': wyekwipowano ' + card.name;
  }

  var allP = G.playerOrder.map(function(id){return G.players[id]});
  checkDead(allP);
  G.playerOrder.filter(function(id){return id!==myId}).forEach(function(id) {
    if (G.players[id].hp <= 0) eliminatePlayer(id);
  });
  checkWin();
  afterAction();
}

function action_attack(attackerUid, targetUid, targetType, targetOwnerId) {
  if (G.phase !== 'playing' || G.activePlayer !== myId) return;
  var me = G.players[myId];
  var attacker = me.board.find(function(c){return c.uid===attackerUid});
  if (!attacker || !attacker.canAtk || attacker.fresh) return;
  var targetEnemy = targetOwnerId ? G.players[targetOwnerId] : G.playerOrder.filter(function(id){return id!==myId}).map(function(id){return G.players[id]})[0];
  if (!targetEnemy) return;

  if (targetType === 'hero') {
    if (hasTaunt(targetEnemy.board)) return;
    var oppIdx = G.playerOrder.indexOf(targetEnemy.id);
    pendingEvents.push({ kind:'attack_anim', attackerId:attacker.uid, targetId:'hero_'+oppIdx, amount:0 });
    dealDamageToHero(targetEnemy, attacker.atk??0);
    attacker.canAtk = false;
    G.log = attacker.name + ' atakuje bohatera za ' + attacker.atk + '!';
  } else {
    var defender = targetEnemy.board.find(function(c){return c.uid===targetUid});
    if (!defender) return;
    if (!(defender.keywords && defender.keywords.indexOf("taunt")!==-1) && hasTaunt(targetEnemy.board)) return;
    pendingEvents.push({ kind:'attack_anim', attackerId:attacker.uid, targetId:defender.uid, amount:0 });
    minionCombat(attacker, defender);
    // Kill reward: if your minion survives and kills, gain 1 armor
    if (defender.curHp <= 0 && attacker.curHp > 0) {
      me.armor = (me.armor||0) + 1;
      G.log = attacker.name + ' niszczy ' + defender.name + '! +1 pancerza.';
    } else {
      G.log = attacker.name + ' atakuje ' + defender.name;
    }
  }

  var allP = G.playerOrder.map(function(id){return G.players[id]});
  checkDead(allP);
  G.playerOrder.filter(function(id){return id!==myId}).forEach(function(id) {
    if (G.players[id].hp <= 0) eliminatePlayer(id);
  });
  checkWin();
  afterAction();
}

function action_heroAttack(targetUid, targetType, targetOwnerId) {
  if (G.phase !== 'playing' || G.activePlayer !== myId) return;
  var me = G.players[myId];
  if (!me.canHeroAtk || me.heroAtkVal === 0) return;
  var targetEnemy = targetOwnerId ? G.players[targetOwnerId]
    : G.playerOrder.filter(function(id){return id!==myId}).map(function(id){return G.players[id]})[0];
  if (!targetEnemy) return;
  var meIdx = G.playerOrder.indexOf(myId);

  if (targetType === 'hero') {
    if (hasTaunt(targetEnemy.board)) return;
    var oppIdx = G.playerOrder.indexOf(targetEnemy.id);
    pendingEvents.push({ kind:'attack_anim', attackerId:'hero_'+meIdx, targetId:'hero_'+oppIdx, amount:0 });
    dealDamageToHero(targetEnemy, me.heroAtkVal);
  } else {
    var def = targetEnemy.board.find(function(c){return c.uid===targetUid});
    if (!def) return;
    if (!(def.keywords && def.keywords.indexOf("taunt")!==-1) && hasTaunt(targetEnemy.board)) return;
    pendingEvents.push({ kind:'attack_anim', attackerId:'hero_'+meIdx, targetId:def.uid, amount:0 });
    def.curHp -= me.heroAtkVal;
    pendingEvents.push({ kind:'damage', targetId:def.uid, amount:me.heroAtkVal });
    // Kill reward: hero kills a minion → +1 armor
    if (def.curHp <= 0) {
      me.armor = (me.armor||0) + 1;
      G.log = 'Bohater niszczy ' + def.name + '! +1 pancerza.';
    }
  }
  if (me.weapon) {
    me.weapon.durability--;
    if (me.weapon.durability <= 0) { me.weapon = null; me.heroAtkVal = 0; }
  }
  me.canHeroAtk = false;
  var allP = G.playerOrder.map(function(id){return G.players[id]});
  checkDead(allP);
  G.playerOrder.filter(function(id){return id!==myId}).forEach(function(id) {
    if (G.players[id].hp <= 0) eliminatePlayer(id);
  });
  checkWin();
  afterAction();
}

function action_heroPower(targetUid, targetType, targetOwnerId) {
  if (G.phase !== 'playing' || G.activePlayer !== myId) return;
  var me = G.players[myId];
  if (me.heroPowerUsed || me.mana < 2) return;
  me.mana -= 2; me.heroPowerUsed = true;
  var allEnemies = G.playerOrder.filter(function(id){return id!==myId}).map(function(id){return G.players[id]});
  var targetEnemy = targetOwnerId ? G.players[targetOwnerId] : allEnemies[0];

  if (me.cls === 'mage') {
    if (targetType === 'hero' && targetEnemy) dealDamageToHero(targetEnemy, 1);
    else if (targetUid) {
      var found = false;
      for (var ei=0; ei<allEnemies.length; ei++) {
        var def = allEnemies[ei].board.find(function(c){return c.uid===targetUid});
        if (def) { def.curHp -= 1; pendingEvents.push({ kind:'damage', targetId:def.uid, amount:1 }); found = true; break; }
      }
      if (!found) {
        var def2 = me.board.find(function(c){return c.uid===targetUid});
        if (def2) { def2.curHp -= 1; pendingEvents.push({ kind:'damage', targetId:def2.uid, amount:1 }); }
      }
    }
    G.log = "Hero Power: 1 obra\u017Cenie!";
  } else if (me.cls === 'warrior') {
    me.armor += 2; G.log = "Hero Power: +2 pancerza!";
  } else if (me.cls === 'rogue') {
    me.weapon = { uid:uid(), name:'Ukryty Ostrze', art:'\uD83D\uDDE1\uFE0F', atk:1, durability:2, cost:2 };
    me.heroAtkVal = 1; me.canHeroAtk = true; G.log = "Hero Power: Sztylet 1/2!";
  } else if (me.cls === 'priest') {
    var t = resolveHealTarget(me, allEnemies, targetUid, targetType, targetOwnerId);
    if (t) { if ('maxMana' in t) healHero(t, 2); else healMinion(t, 2); }
    G.log = "Hero Power: Przywr\u00F3cono 2 HP!";
  }

  var allP = G.playerOrder.map(function(id){return G.players[id]});
  checkDead(allP);
  checkWin();
  afterAction();
}

function action_endTurn() {
  if (G.phase !== 'playing' || G.activePlayer !== myId) return;
  var me = G.players[myId];
  var allEnemies = G.playerOrder.filter(function(id){return id!==myId}).map(function(id){return G.players[id]});

  applyEndOfTurnEffects(me, allEnemies);
  var allP = G.playerOrder.map(function(id){return G.players[id]});
  checkDead(allP);
  G.playerOrder.filter(function(id){return id!==myId}).forEach(function(id) {
    if (G.players[id].hp <= 0) eliminatePlayer(id);
  });
  checkWin();
  if (G.phase === 'over') { afterAction(); return; }

  me.board.forEach(function(c) { c.fresh = false; c.canAtk = true; });
  me.playedThisTurn = false;

  var nextId = getNextLivingPlayer(myId);
  G.activePlayer = nextId;
  G.turn++;
  var next = G.players[nextId];
  next.turnsPlayed = (next.turnsPlayed || 0) + 1;
  next.maxMana = Math.min(10, next.turnsPlayed + 1);
  next.mana = next.maxMana;
  next.heroPowerUsed = false;
  next.canHeroAtk = !!next.weapon;
  drawCards(next, 1);
  next.board.forEach(function(c) { c.fresh = false; c.canAtk = true; });

  afterAction();
  if (next.botLevel > 0) {
    var BOT_NAMES = ['','\u017B\u00F3\u0142todziob','Normalny','Trudny','Ekspert'];
    G.log = 'Bot (' + BOT_NAMES[next.botLevel] + ') my\u015Bli...';
    render();
    setTimeout(function(){ runBotTurn(nextId, 0); }, 900);
  }
}

function afterAction() {
  var evs = pendingEvents.slice(); pendingEvents = [];
  if (G.phase === 'over') {
    render(); playAnimEvents(evs); setTimeout(function(){ showGameOver(); }, 800);
    return;
  }
  playAnimEvents(evs);
  render();
}

// ======================================================================
// BOT AI
// ======================================================================
function runBotTurn(botId, safety) {
  if (safety === undefined) safety = 0;
  if (safety > 25 || G.phase !== 'playing' || G.activePlayer !== botId) return;
  var bot = G.players[botId];
  if (!bot) return;
  var delay = [0,1100,850,650,450][bot.botLevel ?? 1];
  setTimeout(function() {
    if (G.phase !== 'playing' || G.activePlayer !== botId) return;
    var move = getNextBotMove(botId);
    if (!move) return;
    executeBotMove(move, botId);
    if (move.type !== 'end_turn' && G.phase === 'playing' && G.activePlayer === botId) {
      runBotTurn(botId, safety+1);
    }
  }, delay);
}

function executeBotMove(move, botId) {
  var bot = G.players[botId];
  if (!bot) return;
  // All living opponents (other bots AND the human player)
  var allEnemies_bot = G.playerOrder
    .filter(function(id){return id !== botId})
    .map(function(id){return G.players[id]})
    .filter(function(p){return p && p.hp > 0});
  // Resolve the specific target player for this move
  var targetPlayer = (move.targetOwnerId && G.players[move.targetOwnerId] && G.players[move.targetOwnerId].hp > 0)
    ? G.players[move.targetOwnerId]
    : allEnemies_bot.slice().sort(function(a,b){return (a.hp+a.armor)-(b.hp+b.armor)})[0];
  var human = G.players[myId]; // kept for win-check convenience

  if (move.type === 'end_turn') {
    applyEndOfTurnEffects(bot, allEnemies_bot);

    if (currentCampaignChapter && currentCampaignChapter.specialRule === 'group_synergy') {
      var allBots = G.playerOrder.filter(function(id){return id!==myId}).map(function(id){return G.players[id]});
      var allBotMinions = allBots.flatMap(function(b){return b.board});
      if (allBotMinions.length > 0) {
        var t = allBotMinions[Math.floor(Math.random()*allBotMinions.length)];
        t.atk = (t.atk??0)+1; t.curHp += 1; t.maxHp += 1;
      }
    }

    var allP = G.playerOrder.map(function(id){return G.players[id]});
    checkDead(allP);
    if (human.hp <= 0) { checkWin(); afterAction(); return; }
    checkWin(); if (G.phase === 'over') { afterAction(); return; }

    bot.board.forEach(function(c) { c.fresh = false; c.canAtk = true; });
    bot.playedThisTurn = false;

    // Eliminate any bots with HP <= 0 before routing to next player
    G.playerOrder.filter(function(id){ return id !== myId && G.players[id] && G.players[id].hp <= 0; })
      .forEach(function(id){ eliminatePlayer(id); });

    var nextId = getNextLivingPlayer(botId);
    G.activePlayer = nextId;
    G.turn++;
    var next = G.players[nextId];
    next.turnsPlayed = (next.turnsPlayed || 0) + 1;
    next.maxMana = Math.min(10, next.turnsPlayed + 1);
    next.mana = next.maxMana;
    next.heroPowerUsed = false;
    next.canHeroAtk = !!next.weapon;
    drawCards(next, 1);
    next.board.forEach(function(c) { c.fresh = false; c.canAtk = true; });

    var evs = pendingEvents.slice(); pendingEvents = [];
    playAnimEvents(evs);

    if (nextId === myId) {
      render(); showTurnBanner("TWOJA TURA", true);
    } else {
      render();
      var BOT_NAMES = ['','\u017B\u00F3\u0142todziob','Normalny','Trudny','Ekspert'];
      G.log = 'Bot (' + BOT_NAMES[next.botLevel] + ') my\u015Bli...';
      render();
      setTimeout(function(){ runBotTurn(nextId, 0); }, 900);
    }
    return;
  }

  if (move.type === 'play_card') {
    var idx = bot.hand.findIndex(function(c){return c.uid===move.cardUid});
    if (idx === -1) return;
    var card = bot.hand[idx];
    if (bot.mana < card.cost) return;
    var hadPlayed = bot.playedThisTurn;
    bot.mana -= card.cost; bot.hand.splice(idx,1); bot.playedThisTurn = true;
    if (card.type === 'minion') {
      if (bot.board.length >= 4) { bot.hand.splice(idx,0,card); bot.mana += card.cost; bot.playedThisTurn = hadPlayed; return; }
      card.canAtk = !!(card.keywords && card.keywords.indexOf("charge")!==-1);
      card.fresh = !(card.keywords && card.keywords.indexOf("charge")!==-1);
      bot.board.push(card);
      applyBattlecry(card, bot, allEnemies_bot, move.targetUid, move.targetType, myId);
      if (hadPlayed && card.combo) applyCombo(card, bot, allEnemies_bot);
    } else if (card.type === 'spell') {
      applySpell(card, bot, allEnemies_bot, move.targetUid, move.targetType, myId);
    } else if (card.type === 'weapon') {
      bot.weapon = { uid:uid(), name:card.name, art:card.art, atk:card.weaponAtk, durability:card.durability, cost:card.cost };
      bot.heroAtkVal = card.weaponAtk; bot.canHeroAtk = true;
    }
  } else if (move.type === 'attack') {
    var attacker = bot.board.find(function(c){return c.uid===move.attackerUid});
    if (!attacker || !attacker.canAtk || attacker.fresh) return;
    if (move.targetType === 'hero') {
      if (!targetPlayer || hasTaunt(targetPlayer.board)) return;
      var oppIdx = G.playerOrder.indexOf(targetPlayer.id);
      pendingEvents.push({ kind:'attack_anim', attackerId:attacker.uid, targetId:'hero_'+oppIdx, amount:0 });
      dealDamageToHero(targetPlayer, attacker.atk??0);
      attacker.canAtk = false;
    } else {
      // Search all opponents' boards for the target minion
      var def = null;
      for (var oi=0; oi<allEnemies_bot.length; oi++) {
        def = allEnemies_bot[oi].board.find(function(c){return c.uid===move.targetUid});
        if (def) break;
      }
      if (!def) return;
      pendingEvents.push({ kind:'attack_anim', attackerId:attacker.uid, targetId:def.uid, amount:0 });
      minionCombat(attacker, def);
    }
  } else if (move.type === 'hero_attack') {
    if (!bot.canHeroAtk || bot.heroAtkVal === 0) return;
    var botIdx = G.playerOrder.indexOf(botId);
    if (move.targetType === 'hero') {
      if (!targetPlayer || hasTaunt(targetPlayer.board)) return;
      var hIdx = G.playerOrder.indexOf(targetPlayer.id);
      pendingEvents.push({ kind:'attack_anim', attackerId:'hero_'+botIdx, targetId:'hero_'+hIdx, amount:0 });
      dealDamageToHero(targetPlayer, bot.heroAtkVal);
    } else {
      var def2 = null;
      for (var oi2=0; oi2<allEnemies_bot.length; oi2++) {
        def2 = allEnemies_bot[oi2].board.find(function(c){return c.uid===move.targetUid});
        if (def2) break;
      }
      if (!def2) return;
      pendingEvents.push({ kind:'attack_anim', attackerId:'hero_'+botIdx, targetId:def2.uid, amount:0 });
      def2.curHp -= bot.heroAtkVal;
      pendingEvents.push({ kind:'damage', targetId:def2.uid, amount:bot.heroAtkVal });
    }
    if (bot.weapon) { bot.weapon.durability--; if (bot.weapon.durability <= 0) { bot.weapon = null; bot.heroAtkVal = 0; } }
    bot.canHeroAtk = false;
  } else if (move.type === 'hero_power') {
    if (bot.heroPowerUsed || bot.mana < 2) return;
    bot.mana -= 2; bot.heroPowerUsed = true;
    if (currentCampaignChapter && currentCampaignChapter.specialRule === 'boss_fight' && move.isBossHeroPower) {
      dealDamageToHero(targetPlayer || human, 3);
      drawCards(bot, 1);
      G.log = "Minister u\u017Cywa Hero Power: 3 obra\u017Cenia!";
    } else if (bot.cls === 'warrior') {
      bot.armor += 2;
    } else if (bot.cls === 'rogue') {
      bot.weapon = { uid:uid(), name:'Ukryty Ostrze', art:'\uD83D\uDDE1\uFE0F', atk:1, durability:2, cost:2 };
      bot.heroAtkVal = 1; bot.canHeroAtk = true;
    } else if (bot.cls === 'mage') {
      if (move.targetUid) {
        var def3 = null;
        for (var oi3=0; oi3<allEnemies_bot.length; oi3++) {
          def3 = allEnemies_bot[oi3].board.find(function(c){return c.uid===move.targetUid});
          if (def3) break;
        }
        if (def3) { def3.curHp -= 1; pendingEvents.push({ kind:'damage', targetId:def3.uid, amount:1 }); }
      } else dealDamageToHero(targetPlayer || human, 1);
    } else if (bot.cls === 'priest') {
      healHero(bot, 2);
    }
  }

  var allP = G.playerOrder.map(function(id){return G.players[id]});
  checkDead(allP);
  if (human.hp <= 0) { checkWin(); afterAction(); return; }
  G.playerOrder.filter(function(id){return id!==myId}).forEach(function(id) {
    if (G.players[id].hp <= 0) eliminatePlayer(id);
  });
  checkWin();
  var evs = pendingEvents.slice(); pendingEvents = [];
  playAnimEvents(evs);
  render();
}

function getNextBotMove(botId) {
  if (G.phase !== 'playing' || G.activePlayer !== botId) return null;
  var bot = G.players[botId];
  if (!bot) return null;
  var lvl = bot.botLevel;

  // All living opponents (other bots + human)
  var allOpponents = G.playerOrder
    .filter(function(id){return id !== botId})
    .map(function(id){return G.players[id]})
    .filter(function(p){return p && p.hp > 0});
  if (allOpponents.length === 0) return { type:'end_turn' };
  // Primary target: lowest effective HP
  var target = allOpponents.slice().sort(function(a,b){return (a.hp+a.armor)-(b.hp+b.armor)})[0];

  var taunts = target.board.filter(function(c){return !c.silenced && c.keywords && c.keywords.indexOf('taunt')!==-1});
  var attackers = bot.board.filter(function(c){return c.canAtk && !c.fresh});
  var playable = bot.hand.filter(function(c){return c.cost <= bot.mana && (c.type !== 'minion' || bot.board.length < 4)});

  // L4: Check lethal on primary target
  if (lvl >= 4 && taunts.length === 0) {
    var totalBoardDmg = attackers.reduce(function(s,c){return s+(c.atk??0)}, 0);
    var heroDmg = bot.canHeroAtk ? bot.heroAtkVal : 0;
    var spellDmg = 0, manaLeft = bot.mana;
    playable.filter(function(c){return ['deal4face','deal6face'].indexOf(c.spellEffect??'')!==-1}).sort(function(a,b){return a.cost-b.cost})
      .forEach(function(c){ if(c.cost<=manaLeft){spellDmg+=(c.spellEffect==='deal4face'?4:6);manaLeft-=c.cost;} });
    if (totalBoardDmg+heroDmg+spellDmg >= target.hp+target.armor) {
      var dmgSpell = playable.find(function(c){return ['deal4face','deal6face'].indexOf(c.spellEffect??'')!==-1});
      if (dmgSpell) return botBuildPlayCard(dmgSpell, bot, target, lvl);
      if (attackers.length > 0) return { type:'attack', attackerUid:attackers[0].uid, targetType:'hero', targetOwnerId:target.id };
      if (bot.canHeroAtk && bot.heroAtkVal > 0) return { type:'hero_attack', targetType:'hero', targetOwnerId:target.id };
    }
  }

  // 1. Play a card
  if (playable.length > 0) {
    var card;
    if (lvl===1) card = playable[Math.floor(Math.random()*playable.length)];
    else if (lvl===2) card = playable.slice().sort(function(a,b){return a.cost-b.cost})[0];
    else if (lvl===3) card = playable.slice().sort(function(a,b){return b.cost-a.cost})[0];
    else {
      var spells = playable.filter(function(c){return c.type==='spell' && c.spellEffect && c.spellEffect.indexOf('deal')!==-1});
      card = (spells.length>0 && target.board.length>0) ? spells.sort(function(a,b){return b.cost-a.cost})[0] : playable.slice().sort(function(a,b){return b.cost-a.cost})[0];
    }
    return botBuildPlayCard(card, bot, target, lvl);
  }

  // 2. Attack with a minion
  if (attackers.length > 0) {
    var attacker = lvl===1 ? attackers[Math.floor(Math.random()*attackers.length)] : attackers[0];
    var move = botBuildMinionAttack(attacker, target, lvl);
    if (move) return move;
  }

  // 3. Hero power
  if (!bot.heroPowerUsed && bot.mana >= 2) return botBuildHeroPower(bot, target, lvl);

  // 4. Hero weapon attack
  if (bot.canHeroAtk && bot.heroAtkVal > 0) return botBuildHeroAttack(bot, target, lvl);

  return { type:'end_turn' };
}

function botBuildPlayCard(card, bot, target, lvl) {
  var msg = { type:'play_card', cardUid:card.uid };
  var eff = card.spellEffect;
  if (eff==='deal4face'||eff==='deal6face') {
    var dmg = eff==='deal4face'?4:6;
    if (lvl>=3 && target.board.length>0) {
      var killable = target.board.filter(function(c){return c.curHp<=dmg});
      if (killable.length>0) { var t=killable.sort(function(a,b){return b.curHp-a.curHp})[0]; msg.targetUid=t.uid; msg.targetType='minion_opp'; msg.targetOwnerId=target.id; return msg; }
    }
    msg.targetType='hero'; msg.targetOwnerId=target.id; return msg;
  }
  if (eff && eff.indexOf('heal')!==-1) { msg.targetType='hero_me'; return msg; }
  if (card.battlecry==='heal2target'||card.battlecry==='heal4target') { msg.targetType='hero_me'; return msg; }
  if (card.battlecry==='deal1'||card.battlecry==='deal2') {
    var dmg2 = card.battlecry==='deal1'?1:2;
    if (lvl>=3 && target.board.length>0) {
      var killable2 = target.board.filter(function(c){return c.curHp<=dmg2});
      if (killable2.length>0) { var t2=killable2.sort(function(a,b){return (b.atk??0)-(a.atk??0)})[0]; msg.targetUid=t2.uid; msg.targetType='minion_opp'; msg.targetOwnerId=target.id; return msg; }
    }
    msg.targetType='hero'; msg.targetOwnerId=target.id; return msg;
  }
  return msg;
}

function botBuildMinionAttack(attacker, target, lvl) {
  var taunts = target.board.filter(function(c){return !c.silenced && c.keywords && c.keywords.indexOf('taunt')!==-1});
  if (taunts.length>0) return { type:'attack', attackerUid:attacker.uid, targetUid:taunts[0].uid, targetType:'minion', targetOwnerId:target.id };
  if (lvl===1) {
    if (target.board.length>0 && Math.random()<0.6) { var t=target.board[Math.floor(Math.random()*target.board.length)]; return { type:'attack', attackerUid:attacker.uid, targetUid:t.uid, targetType:'minion', targetOwnerId:target.id }; }
    return { type:'attack', attackerUid:attacker.uid, targetType:'hero', targetOwnerId:target.id };
  }
  if (lvl===2) return { type:'attack', attackerUid:attacker.uid, targetType:'hero', targetOwnerId:target.id };
  if (lvl===3) {
    if (target.board.length>0) { var s=target.board.slice().sort(function(a,b){return (b.atk??0)-(a.atk??0)}); if((s[0].atk??0)>=3) return { type:'attack', attackerUid:attacker.uid, targetUid:s[0].uid, targetType:'minion', targetOwnerId:target.id }; }
    return { type:'attack', attackerUid:attacker.uid, targetType:'hero', targetOwnerId:target.id };
  }
  if (target.board.length>0) {
    var fav = target.board.find(function(t){return (attacker.atk??0)>=t.curHp && attacker.curHp>(t.atk??0)});
    if (fav) return { type:'attack', attackerUid:attacker.uid, targetUid:fav.uid, targetType:'minion', targetOwnerId:target.id };
    var dang = target.board.slice().sort(function(a,b){return (b.atk??0)-(a.atk??0)})[0];
    if ((dang.atk??0)>=attacker.curHp) return { type:'attack', attackerUid:attacker.uid, targetUid:dang.uid, targetType:'minion', targetOwnerId:target.id };
  }
  return { type:'attack', attackerUid:attacker.uid, targetType:'hero', targetOwnerId:target.id };
}

function botBuildHeroPower(bot, target, lvl) {
  if (currentCampaignChapter && currentCampaignChapter.specialRule === 'boss_fight') {
    var ch = currentCampaignChapter;
    var botDef = ch.bots.find(function(b){return b.isBoss && bot.cls === b.cls});
    if (botDef && botDef.isBoss) return { type:'hero_power', isBossHeroPower:true, targetOwnerId:target.id };
  }
  if (bot.cls==='warrior'||bot.cls==='rogue') return { type:'hero_power' };
  if (bot.cls==='mage') {
    if (lvl>=3) { var oneHp=target.board.find(function(c){return c.curHp===1}); if(oneHp) return { type:'hero_power', targetUid:oneHp.uid, targetType:'minion', targetOwnerId:target.id }; }
    return { type:'hero_power', targetType:'hero', targetOwnerId:target.id };
  }
  if (bot.cls==='priest') return { type:'hero_power', targetType:'hero_me' };
  return { type:'hero_power' };
}

function botBuildHeroAttack(bot, target, lvl) {
  var taunts = target.board.filter(function(c){return !c.silenced && c.keywords && c.keywords.indexOf('taunt')!==-1});
  if (taunts.length>0) return { type:'hero_attack', targetUid:taunts[0].uid, targetType:'minion', targetOwnerId:target.id };
  if (lvl<=2) return { type:'hero_attack', targetType:'hero', targetOwnerId:target.id };
  if (target.board.length>0) { var d=target.board.slice().sort(function(a,b){return (b.atk??0)-(a.atk??0)})[0]; if((d.atk??0)>=2) return { type:'hero_attack', targetUid:d.uid, targetType:'minion', targetOwnerId:target.id }; }
  return { type:'hero_attack', targetType:'hero', targetOwnerId:target.id };
}

function initLobby() {
  var grid = document.getElementById('class-grid');
  while (grid.firstChild) grid.removeChild(grid.firstChild);
  ALL_CLASSES.forEach(function(cls) {
    var info = CLASSES[cls];
    var div = document.createElement('div');
    div.className = 'class-card';
    div.dataset.cls = cls;
    div.onclick = function(){ selectClass(cls); };
    var art = document.createElement('div');
    art.className = 'cl-art';
    art.textContent = info.art;
    var name = document.createElement('div');
    name.className = 'cl-name';
    name.textContent = info.cls;
    var hp = document.createElement('div');
    hp.className = 'cl-hp';
    hp.textContent = info.heroPowerText;
    div.appendChild(art);
    div.appendChild(name);
    div.appendChild(hp);
    grid.appendChild(div);
  });

  // Bot count
  var bcRow = document.getElementById('bot-count-row');
  while (bcRow.firstChild) bcRow.removeChild(bcRow.firstChild);
  [1,2,3,4].forEach(function(n) {
    var btn = document.createElement('button');
    btn.className = 'opt-btn' + (n===selectedBotCount?' sel':'');
    btn.textContent = String(n);
    btn.onclick = function(){ selectedBotCount = n; updateLobbySelections(); };
    bcRow.appendChild(btn);
  });

  // Difficulty
  var dRow = document.getElementById('diff-row');
  while (dRow.firstChild) dRow.removeChild(dRow.firstChild);
  var dLabels = document.getElementById('diff-labels');
  while (dLabels.firstChild) dLabels.removeChild(dLabels.firstChild);
  var BOT_NAMES = ['\u017B\u00F3\u0142todziob','Normalny','Trudny','Ekspert'];
  [1,2,3,4].forEach(function(n,i) {
    var btn = document.createElement('button');
    btn.className = 'opt-btn' + (n===selectedDifficulty?' sel':'');
    btn.textContent = String(n);
    btn.onclick = function(){ selectedDifficulty = n; updateLobbySelections(); };
    dRow.appendChild(btn);

    var lbl = document.createElement('div');
    lbl.className = 'diff-label';
    lbl.textContent = BOT_NAMES[i];
    dLabels.appendChild(lbl);
  });
}

function updateLobbySelections() {
  var bcBtns = document.querySelectorAll('#bot-count-row .opt-btn');
  bcBtns.forEach(function(btn,i){ btn.classList.toggle('sel', (i+1)===selectedBotCount); });
  var dBtns = document.querySelectorAll('#diff-row .opt-btn');
  dBtns.forEach(function(btn,i){ btn.classList.toggle('sel', (i+1)===selectedDifficulty); });
}

function selectClass(cls) {
  selectedClass = cls;
  document.querySelectorAll('.class-card').forEach(function(el){el.classList.remove('sel')});
  var el = document.querySelector('[data-cls="'+cls+'"]');
  if (el) el.classList.add('sel');
  document.getElementById('start-quick-btn').removeAttribute('disabled');
}

function startQuickGame() {
  if (!selectedClass) return;
  action_joinGame(selectedClass, selectedBotCount, selectedDifficulty);
}

function showCampaignMap() {
  if (!selectedClass) { alert('Najpierw wybierz klas\u0119!'); return; }
  renderCampaignMap();
  showScreen('campaign-map');
}

function renderCampaignMap() {
  var progress = getCampaignProgress();
  var container = document.getElementById('campaign-nodes');
  while (container.firstChild) container.removeChild(container.firstChild);
  CAMPAIGN.forEach(function(ch) {
    var unlocked = ch.id <= progress+1;
    var completed = ch.id <= progress;
    var node = document.createElement('div');
    node.className = 'campaign-node' + (completed?' completed':unlocked?' unlocked':' locked');

    var numEl = document.createElement('div');
    numEl.className = 'cn-num';
    numEl.textContent = completed ? '\u2713' : String(ch.id);
    node.appendChild(numEl);

    var titleEl = document.createElement('div');
    titleEl.className = 'cn-title';
    titleEl.textContent = ch.title;
    node.appendChild(titleEl);

    if (ch.specialRuleText) {
      var ruleEl = document.createElement('div');
      ruleEl.className = 'cn-rule';
      ruleEl.textContent = ch.specialRuleText;
      node.appendChild(ruleEl);
    }

    var botsEl = document.createElement('div');
    botsEl.className = 'cn-bots';
    botsEl.textContent = 'Przeciwnicy: ' + ch.bots.length;
    node.appendChild(botsEl);

    if (unlocked) node.onclick = (function(chapter){ return function(){ showChapterIntro(chapter); }; })(ch);
    container.appendChild(node);
  });
}

function showChapterIntro(chapter) {
  document.getElementById('ci-title').textContent = chapter.title;
  document.getElementById('ci-story').textContent = chapter.story;
  var ruleEl = document.getElementById('ci-rule');
  if (chapter.specialRuleText) { ruleEl.textContent = '\u26A0 ' + chapter.specialRuleText; ruleEl.style.display='block'; }
  else ruleEl.style.display='none';
  document.getElementById('ci-bots').textContent = 'Przeciwnicy: ' + chapter.bots.length;
  document.getElementById('ci-start-btn').onclick = function(){ action_joinGame(selectedClass, 0, 0, chapter); };
  showScreen('chapter-intro');
}

function renderMulligan() {
  var me = G.players[myId];
  if (!me) return;
  var myPos = G.playerOrder.indexOf(myId);
  var subEl = document.querySelector('.mul-sub');
  if (subEl) {
    if (myPos === 0) subEl.textContent = 'Zaczynasz pierwszy! Wymie\u0144 karty.';
    else subEl.textContent = 'Pozycja ' + (myPos+1) + ' \u2014 dostaniesz ' + myPos + (myPos===1?' monet\u0119':' monety') + '! Wymie\u0144 karty.';
  }
  var mulEl = document.getElementById('mulligan-cards');
  if (!mulEl) return;
  while (mulEl.firstChild) mulEl.removeChild(mulEl.firstChild);
  mulliganSelected = new Set();
  me.hand.filter(function(c){ return c.id !== 'coin'; }).forEach(function(c) {
    var div = document.createElement('div');
    div.className = 'hand-card' + (c.type==='spell'?' spell':'') + (c.type==='weapon'?' weapon-card':'') + (c.legendary?' legendary':'') + ' playable';

    var costEl = document.createElement('div');
    costEl.className = 'hc-cost';
    costEl.textContent = String(c.cost);
    div.appendChild(costEl);

    var artEl = document.createElement('div');
    artEl.className = 'hc-art';
    artEl.textContent = c.art;
    div.appendChild(artEl);

    var nameEl = document.createElement('div');
    nameEl.className = 'hc-name';
    nameEl.textContent = c.name;
    div.appendChild(nameEl);

    var typeEl = document.createElement('div');
    typeEl.className = 'hc-type';
    typeEl.textContent = c.type==='spell'?'\u2728 Czar':c.type==='weapon'?'\u2694\uFE0F Bro\u0144':'Minionek';
    div.appendChild(typeEl);

    var descTxt = c.bcText||c.spellText||'';
    if (descTxt) {
      div.addEventListener('mouseenter', (function(d, t){ return function(){ showCardTip(d, t); }; })(div, descTxt));
      div.addEventListener('mouseleave', hideCardTip);
    }

    if (c.type==='minion') {
      var atkEl = document.createElement('div');
      atkEl.className = 'hc-atk';
      atkEl.textContent = String(c.atk??0);
      div.appendChild(atkEl);
      var hpEl = document.createElement('div');
      hpEl.className = 'hc-hp';
      hpEl.textContent = String(c.curHp??0);
      div.appendChild(hpEl);
    }

    div.dataset.uid = c.uid;
    div.onclick = (function(card, element){
      return function() {
        if (mulliganSelected.has(card.uid)) { mulliganSelected.delete(card.uid); element.classList.remove('selected-replace'); }
        else { mulliganSelected.add(card.uid); element.classList.add('selected-replace'); }
      };
    })(c, div);
    mulEl.appendChild(div);
  });
  document.getElementById('mulligan-confirm').onclick = function() {
    action_mulligan(Array.from(mulliganSelected));
  };
}
