// ======================================================================
function render() {
  if (!G || G.phase === 'waiting') return;
  if (G.phase === 'mulligan') { renderMulligan(); return; }
  if (G.phase !== 'playing' && G.phase !== 'over') return;

  var me = G.players[myId];
  if (!me) return;
  var isMyTurnNow = G.activePlayer === myId && G.phase === 'playing';

  // Update top bar — show active player name + turn position
  var badge = document.getElementById('turn-badge');
  if (badge) {
    var activeIdx = G.playerOrder.indexOf(G.activePlayer) + 1;
    var totalP = G.playerOrder.length;
    var posStr = ' (' + activeIdx + '/' + totalP + ')';
    if (isMyTurnNow) {
      badge.textContent = 'TWOJA TURA' + posStr;
      badge.className = 'bar-phase yours';
    } else {
      var activePl = G.players[G.activePlayer];
      var activeClsName = activePl ? (CLASSES[activePl.cls]?.cls ?? activePl.cls) : 'Bot';
      badge.textContent = activeClsName + posStr;
      badge.className = 'bar-phase theirs';
    }
  }

  // Player order badge
  var myOrderBadge = document.getElementById('my-order-badge');
  if (myOrderBadge) {
    var circledNums = ['\u2460','\u2461','\u2462','\u2463','\u2464'];
    var myPos = G.playerOrder.indexOf(myId);
    myOrderBadge.textContent = circledNums[myPos] || String(myPos + 1);
    myOrderBadge.className = 'order-badge' + (isMyTurnNow ? ' active-turn' : '');
  }

  // Render enemy zones
  renderEnemyZones();

  // Player hero area
  var myIdx = G.playerOrder.indexOf(myId);
  document.getElementById('my-port-art').textContent = CLASSES[me.cls]?.art ?? '\uD83D\uDC64';

  var myPortEl = document.getElementById('my-port') || document.getElementById('hero_' + myIdx);
  if (myPortEl) {
    myPortEl.className = 'my-hero-port'
      + (me.canHeroAtk && me.heroAtkVal > 0 && isMyTurnNow ? ' can-hero-atk' : '')
      + (selAtk === '__hero__' ? ' sel-hero' : '');
    myPortEl.id = 'hero_' + myIdx;
  }

  document.getElementById('my-hp').textContent = String(me.hp);
  var myArmorEl = document.getElementById('my-armor');
  if (me.armor > 0) { myArmorEl.style.display='flex'; myArmorEl.textContent=String(me.armor); } else myArmorEl.style.display='none';

  // Hero power
  var hpBtn = document.getElementById('hpbtn');
  if (hpBtn) {
    hpBtn.className = 'hp-gem' + (me.heroPowerUsed ? ' used' : '') + ((heroPowerMode||healMode) ? ' active' : '');
    document.getElementById('hp-art').textContent = CLASSES[me.cls]?.heroPowerArt ?? '\u26A1';
    hpBtn.disabled = me.heroPowerUsed || me.mana < 2 || !isMyTurnNow;
  }

  // Mana
  document.getElementById('my-mana-txt').textContent = '\uD83D\uDC8E ' + me.mana + '/' + me.maxMana;

  // Class name & deck
  document.getElementById('my-cls-name').textContent = CLASSES[me.cls]?.cls ?? me.cls;
  document.getElementById('my-deck-info').textContent = '\uD83D\uDCDA ' + me.deck.length;
  var deckTxt = document.getElementById('deck-count-txt');
  if (deckTxt) deckTxt.textContent = me.deck.length;

  // Weapon slot
  var wpnSlot = document.getElementById('my-wpn-slot');
  if (wpnSlot) {
    while (wpnSlot.firstChild) wpnSlot.removeChild(wpnSlot.firstChild);
    if (me.weapon) {
      var wpnCard = document.createElement('div');
      wpnCard.className = 'wpn-card';
      var wpnArt = document.createElement('span');
      wpnArt.className = 'wpn-art';
      wpnArt.textContent = me.weapon.art;
      wpnCard.appendChild(wpnArt);
      var wpnAtk = document.createElement('div');
      wpnAtk.className = 'wpn-atk';
      wpnAtk.textContent = String(me.weapon.atk);
      wpnCard.appendChild(wpnAtk);
      var wpnDur = document.createElement('div');
      wpnDur.className = 'wpn-dur';
      wpnDur.textContent = String(me.weapon.durability);
      wpnCard.appendChild(wpnDur);
      wpnSlot.appendChild(wpnCard);
    }
  }

  // Board
  renderBoard('my-board', me.board, 'me');
  renderHand(me, isMyTurnNow);

  // End turn button
  var eotn = document.getElementById('eotn');
  if (eotn) eotn.disabled = !isMyTurnNow;

  // Log
  var lgEl = document.getElementById('lg-text');
  if (lgEl) lgEl.textContent = G.log;

  // Spell overlay
  var so = document.getElementById('spell-overlay');
  if (pendingSpell || heroPowerMode || healMode) {
    so.classList.add('show');
    var txt = document.getElementById('spell-msg-txt');
    if (pendingSpell) txt.textContent = 'Wybierz cel: ' + pendingSpell.name;
    else if (healMode) txt.textContent = 'Wybierz cel leczenia';
    else txt.textContent = 'Wybierz cel Hero Power';
  } else {
    so.classList.remove('show');
  }

  drawArrow();
}

function renderEnemyZones() {
  var container = document.getElementById('enemy-zones');
  if (!container) return;
  while (container.firstChild) container.removeChild(container.firstChild);
  var botIds = G.playerOrder.filter(function(id){return id !== myId});
  // Vertical layout for 3+ bots: heroes on left, boards on right
  if (botIds.length >= 3) {
    container.classList.add('vertical-layout');
  } else {
    container.classList.remove('vertical-layout');
  }
  var BOT_NAMES = ['','\u017B\u00F3\u0142todziob','Normalny','Trudny','Ekspert'];

  botIds.forEach(function(botId) {
    var bot = G.players[botId];
    if (!bot) return;
    var isThisBotActive = G.activePlayer === botId;
    var zone = document.createElement('div');
    zone.className = 'enemy-zone' + (isThisBotActive ? ' active-bot' : '');
    zone.dataset.botId = botId;

    var botIdx = G.playerOrder.indexOf(botId);

    // Turn order badge
    var circledNums2 = ['\u2460','\u2461','\u2462','\u2463','\u2464'];
    var zoneBadge = document.createElement('div');
    zoneBadge.className = 'order-badge' + (isThisBotActive ? ' active-turn' : '');
    zoneBadge.style.cssText = 'position:absolute;top:3px;left:3px;z-index:5';
    zoneBadge.textContent = circledNums2[botIdx] || String(botIdx + 1);
    zone.style.position = 'relative';
    zone.appendChild(zoneBadge);
    var isBoss = currentCampaignChapter && currentCampaignChapter.bots ? currentCampaignChapter.bots.find(function(b){return b.isBoss && b.cls === bot.cls}) : null;
    var canTarget = canTargetBotHero(bot, botId);

    // Hero area
    var heroArea = document.createElement('div');
    heroArea.className = 'hero-area';

    var heroPort = document.createElement('div');
    heroPort.className = 'hero-port' + (canTarget ? ' attackable' : '');
    heroPort.id = 'hero_' + botIdx;
    var heroArt = document.createElement('span');
    var portSize = botIds.length >= 3 ? '16px' : '20px';
    heroArt.style.fontSize = portSize;
    heroArt.textContent = '\uD83E\uDD16';
    heroPort.appendChild(heroArt);
    var heroHpBadge = document.createElement('div');
    heroHpBadge.className = 'hero-hp';
    heroHpBadge.textContent = String(bot.hp);
    heroPort.appendChild(heroHpBadge);
    if (bot.armor > 0) {
      var armorBadge = document.createElement('div');
      armorBadge.className = 'hero-armor';
      armorBadge.textContent = String(bot.armor);
      heroPort.appendChild(armorBadge);
    }
    heroArea.appendChild(heroPort);

    var compact = botIds.length >= 3;
    var infoDiv = document.createElement('div');
    infoDiv.style.cssText = 'text-align:center;width:100%';
    var clsName = document.createElement('div');
    clsName.style.cssText = 'font-size:' + (compact?'10px':'12px') + ';color:var(--cyan);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%';
    clsName.textContent = CLASSES[bot.cls]?.cls ?? bot.cls;
    infoDiv.appendChild(clsName);
    if (!compact) {
      var lvlName = document.createElement('div');
      lvlName.style.cssText = 'font-size:9px;color:#888';
      lvlName.textContent = BOT_NAMES[bot.botLevel] + (isBoss ? ' \u2605' : '');
      infoDiv.appendChild(lvlName);
    }
    var manaInfo = document.createElement('div');
    manaInfo.style.cssText = 'font-size:9px;color:var(--amber)';
    manaInfo.textContent = '\uD83D\uDC8E ' + bot.mana + '/' + bot.maxMana;
    infoDiv.appendChild(manaInfo);
    if (bot.weapon) {
      var wpnInfo = document.createElement('div');
      wpnInfo.style.cssText = 'font-size:9px;color:var(--amber)';
      wpnInfo.textContent = bot.weapon.art + ' ' + bot.weapon.atk + '/' + bot.weapon.durability;
      infoDiv.appendChild(wpnInfo);
    }
    heroArea.appendChild(infoDiv);

    if (!compact) {
      var handBacks = document.createElement('div');
      handBacks.className = 'hand-backs-row';
      for (var hi=0; hi<bot.hand.length; hi++) {
        var bck = document.createElement('div');
        bck.className = 'bck';
        handBacks.appendChild(bck);
      }
      heroArea.appendChild(handBacks);
    }

    zone.appendChild(heroArea);

    // Board
    var boardRow = document.createElement('div');
    boardRow.className = 'minion-row';
    bot.board.forEach(function(c) {
      var wrap = createMinionElement(c, 'opp', botId);
      boardRow.appendChild(wrap);
    });
    zone.appendChild(boardRow);

    container.appendChild(zone);

    // Attach hero click
    heroPort.addEventListener('click', (function(bid){
      return function(e) { e.stopPropagation(); targetBotHero(bid); };
    })(botId));
  });
}

function createMinionElement(c, side, ownerId) {
  var canA = side === 'me' && c.canAtk && !c.fresh && G.activePlayer === myId;
  var isSel = selAtk === c.uid;
  var isTgt = (selAtk || heroPowerMode || (pendingSpell && !pendingSpellIsHeal)) && side === 'opp';
  var hasTnt = !c.silenced && c.keywords && c.keywords.indexOf('taunt') !== -1;
  var isHeal = (healMode || (pendingSpell && pendingSpellIsHeal));
  var isLeg = c.legendary;

  var wrap = document.createElement('div');
  wrap.className = 'minion-wrap'
    + (isSel ? ' sel' : canA ? ' can-atk' : '')
    + (isTgt ? ' targeted' : '')
    + (hasTnt ? ' taunt' : '')
    + (isHeal && side !== 'opp' ? ' healable' : '')
    + (isLeg ? ' legendary-wrap' : '');
  wrap.dataset.uid = c.uid;
  wrap.dataset.owner = ownerId || '';

  var minion = document.createElement('div');
  minion.className = 'minion'
    + (c.divineShield ? ' divine-shield' : '')
    + (c.curHp < c.maxHp ? ' damaged' : '');

  // Mana cost not shown on board minions (only visible in hand)

  var artEl = document.createElement('div');
  artEl.className = 'm-art';
  artEl.textContent = c.art;
  minion.appendChild(artEl);

  wrap.appendChild(minion);

  var atkBadge = document.createElement('div');
  atkBadge.className = 'm-atk';
  atkBadge.textContent = String(c.atk??0);
  wrap.appendChild(atkBadge);

  var hpBadge = document.createElement('div');
  hpBadge.className = 'm-hp' + (c.curHp < c.maxHp ? ' hurt' : '');
  hpBadge.textContent = String(c.curHp);
  wrap.appendChild(hpBadge);

  if (c.deathrattle && !c.silenced) {
    var dr = document.createElement('div');
    dr.className = 'dr-badge';
    dr.textContent = '\uD83D\uDC80';
    wrap.appendChild(dr);
  }
  if (c.endOfTurn && !c.silenced) {
    var eot = document.createElement('div');
    eot.className = 'eot-badge';
    eot.textContent = '\u23F0';
    wrap.appendChild(eot);
  }
  if (c.combo && side === 'me') {
    var combo = document.createElement('div');
    combo.className = 'combo-badge';
    combo.textContent = '\u26A1';
    wrap.appendChild(combo);
  }
  if (c.divineShield) {
    var ds = document.createElement('div');
    ds.className = 'ds-indicator';
    ds.textContent = '\uD83D\uDD2E';
    wrap.appendChild(ds);
  }

  // Click handler
  if (side === 'opp') {
    wrap.addEventListener('click', (function(card, bid){
      return function(e){ e.stopPropagation(); clickBotMinion(card, bid); };
    })(c, ownerId));
  } else {
    wrap.addEventListener('click', (function(card){
      return function(e){ e.stopPropagation(); clickMyMinion(card); };
    })(c));
  }

  return wrap;
}

function renderBoard(containerId, board, side) {
  var el = document.getElementById(containerId);
  if (!el) return;
  while (el.firstChild) el.removeChild(el.firstChild);
  board.forEach(function(c) {
    var wrap = createMinionElement(c, side, side === 'me' ? myId : '');
    el.appendChild(wrap);
  });
}

function renderHand(me, isMyTurnNow) {
  var el = document.getElementById('my-hand');
  if (!el) return;
  while (el.firstChild) el.removeChild(el.firstChild);
  me.hand.forEach(function(c) {
    var canPlay = isMyTurnNow && c.cost <= me.mana && (c.type !== 'minion' || me.board.length < 4);
    var div = document.createElement('div');
    div.className = 'hand-card'
      + (c.type==='spell'?' spell':'')
      + (c.type==='weapon'?' weapon-card':'')
      + (c.legendary?' legendary':'')
      + (canPlay?' playable':'');

    var costEl = document.createElement('div');
    costEl.className = 'hc-cost';
    costEl.textContent = String(c.cost);
    div.appendChild(costEl);

    var artEl = document.createElement('div');
    artEl.className = 'hc-art';
    artEl.textContent = c.art;
    div.appendChild(artEl);

    var nameEl = document.createElement('div');
    nameEl.className = 'hc-name';
    nameEl.textContent = c.name;
    div.appendChild(nameEl);

    var typeEl = document.createElement('div');
    typeEl.className = 'hc-type';
    typeEl.textContent = c.type==='spell'?'\u2728 Czar':c.type==='weapon'?'\u2694\uFE0F Bro\u0144':'Minionek';
    div.appendChild(typeEl);

    var descTxt = c.bcText||c.spellText||c.drText||c.eotText||c.comboText||'';
    if (descTxt) {
      div.addEventListener('mouseenter', (function(d, t){ return function(){ showCardTip(d, t); }; })(div, descTxt));
      div.addEventListener('mouseleave', hideCardTip);
    }

    if (c.type==='minion') {
      var atkEl = document.createElement('div');
      atkEl.className = 'hc-atk';
      atkEl.textContent = String(c.atk??0);
      div.appendChild(atkEl);
      var hpEl = document.createElement('div');
      hpEl.className = 'hc-hp';
      hpEl.textContent = String(c.curHp??0);
      div.appendChild(hpEl);
    }

    div.dataset.uid = c.uid;
    if (canPlay) {
      div.addEventListener('click', (function(card){
        return function(e){ e.stopPropagation(); clickHandCard(card); };
      })(c));
    }
    el.appendChild(div);
  });
}

// ======================================================================
// INTERACTION
// ======================================================================
function clickHandCard(card) {
  cancelModes();
  if (G.activePlayer !== myId || G.phase !== 'playing') return;
  var me = G.players[myId];
  if (me.mana < card.cost) return;
  if (card.type === 'minion' && me.board.length >= 4) return;

  var needsTarget = card.battlecry === 'deal1' || card.battlecry === 'heal2target' || card.battlecry === 'heal4target'
    || card.spellEffect === 'deal4face' || card.spellEffect === 'heal6target';

  if (needsTarget) {
    pendingSpell = card;
    pendingSpellIsHeal = (card.battlecry && card.battlecry.indexOf('heal')!==-1) || (card.spellEffect && card.spellEffect.indexOf('heal')!==-1);
    render();
    setDragStart();
    return;
  }

  action_playCard(card.uid, null, null, null);
}

function clickMyMinion(card) {
  if (G.activePlayer !== myId || G.phase !== 'playing') return;

  if (healMode) {
    action_heroPower(card.uid, 'minion_me', null);
    cancelModes();
    return;
  }
  if (pendingSpell && pendingSpellIsHeal) {
    action_playCard(pendingSpell.uid, card.uid, 'minion_me', null);
    cancelModes();
    return;
  }
  if (pendingSpell && !pendingSpellIsHeal) {
    action_playCard(pendingSpell.uid, card.uid, 'minion_me', null);
    cancelModes();
    return;
  }
  if (heroPowerMode) {
    action_heroPower(card.uid, 'minion_me', null);
    cancelModes();
    return;
  }

  if (card.canAtk && !card.fresh) {
    selAtk = (selAtk === card.uid) ? null : card.uid;
    render();
    setDragStart();
  }
}

function clickBotMinion(card, botId) {
  if (G.activePlayer !== myId) return;
  if (healMode) { action_heroPower(card.uid, 'minion_opp', botId); cancelModes(); return; }
  if (pendingSpell && pendingSpellIsHeal) {
    action_playCard(pendingSpell.uid, card.uid, 'minion_opp', botId); cancelModes(); return;
  }
  if (pendingSpell) {
    action_playCard(pendingSpell.uid, card.uid, 'minion_opp', botId); cancelModes(); return;
  }
  if (heroPowerMode) { action_heroPower(card.uid, 'minion_opp', botId); cancelModes(); return; }
  if (!selAtk) return;
  if (selAtk === '__hero__') {
    action_heroAttack(card.uid, 'minion', botId); selAtk=null; render(); return;
  }
  action_attack(selAtk, card.uid, 'minion', botId); selAtk=null; render();
}

function canTargetBotHero(bot, botId) {
  if (G.activePlayer !== myId || G.phase !== 'playing') return false;
  var hasTnt = hasTaunt(bot.board);
  return (!hasTnt && selAtk) || heroPowerMode || healMode || !!pendingSpell;
}

function targetBotHero(botId) {
  if (G.activePlayer !== myId) return;
  var bot = G.players[botId];
  if (!bot) return;
  if (healMode) {
    action_heroPower(null, 'hero_opp', botId); cancelModes(); return;
  }
  if (pendingSpell && pendingSpellIsHeal) {
    action_playCard(pendingSpell.uid, null, 'hero_opp', botId); cancelModes(); return;
  }
  if (pendingSpell) {
    action_playCard(pendingSpell.uid, null, 'hero', botId); cancelModes(); return;
  }
  if (heroPowerMode) {
    action_heroPower(null, 'hero', botId); cancelModes(); return;
  }
  if (selAtk === '__hero__') {
    action_heroAttack(null, 'hero', botId); selAtk=null; render(); return;
  }
  if (selAtk) {
    action_attack(selAtk, null, 'hero', botId); selAtk=null; render(); return;
  }
}

function heroSelfClick() {
  if (G.activePlayer !== myId || G.phase !== 'playing') return;
  var me = G.players[myId];

  if (healMode) { action_heroPower(null, 'hero_me', null); cancelModes(); return; }
  if (pendingSpell && pendingSpellIsHeal) { action_playCard(pendingSpell.uid, null, 'hero_me', null); cancelModes(); return; }

  if (me.canHeroAtk && me.heroAtkVal > 0) {
    selAtk = (selAtk === '__hero__') ? null : '__hero__';
    render();
    setDragStart();
  }
}

function clickHeroPower() {
  if (G.activePlayer !== myId || G.phase !== 'playing') return;
  var me = G.players[myId];
  if (me.heroPowerUsed || me.mana < 2) return;

  cancelModes();

  if (me.cls === 'warrior' || me.cls === 'rogue') {
    action_heroPower(null, null, null);
    return;
  }

  if (me.cls === 'priest') {
    healMode = true;
    render();
    setDragStart();
    return;
  }

  heroPowerMode = true;
  render();
  setDragStart();
}

function sendEndTurn() {
  cancelModes();
  action_endTurn();
}

function cancelModes() {
  selAtk = null;
  pendingSpell = null;
  pendingSpellIsHeal = false;
  heroPowerMode = false;
  healMode = false;
}

function setDragStart() {
  var bf = document.getElementById('board');
  if (!bf) return;
  var bfr = bf.getBoundingClientRect();
  // Use attacker's actual position on screen
  var atkEl = selAtk === '__hero__'
    ? (document.getElementById('my-port') || document.getElementById('hero_' + G.playerOrder.indexOf(myId)))
    : (selAtk ? document.querySelector('[data-uid="'+selAtk+'"]') : null);
  if (atkEl) {
    var ar = atkEl.getBoundingClientRect();
    dragStart = { x: ar.left - bfr.left + ar.width/2, y: ar.top - bfr.top + ar.height/2 };
  } else {
    dragStart = { x: bfr.width/2, y: bfr.height - 80 };
  }
  dragCurrent = { x: dragStart.x, y: dragStart.y };
}

// ======================================================================
// TURN BANNER
// ======================================================================
function showTurnBanner(text, isYours) {
  var el = document.getElementById('turn-banner');
  if (!el) return;
  el.textContent = text;
  el.className = 'turn-banner show ' + (isYours ? 'yours' : 'theirs');
  setTimeout(function() { el.classList.remove('show'); }, 1200);
}

// ======================================================================
// GAME OVER
// ======================================================================
function showGameOver() {
  var won = G.winner === 'human';
  var gotEl = document.getElementById('got');
  gotEl.textContent = won ? '\uD83C\uDFC6 Zwyci\u0119stwo!' : '\uD83D\uDC80 Przegrana!';
  gotEl.className = 'got ' + (won ? 'win' : 'lose');
  document.getElementById('gos').textContent = won
    ? 'Twoje ksi\u0119gi s\u0105 bezbł\u0119dne!'
    : 'Urz\u0105d Skarbowy przej\u0105\u0142 kontrol\u0119.';

  var prevRetry = document.getElementById('retry-btn-dynamic');
  if (prevRetry) prevRetry.remove();

  var campaignBtns = document.getElementById('go-campaign-btns');
  if (won && currentCampaignChapter) {
    saveCampaignProgress(currentCampaignChapter.id);
    campaignBtns.style.display = 'block';
    var nextChapter = CAMPAIGN.find(function(c){return c.id === currentCampaignChapter.id + 1});
    var nextBtn = document.getElementById('go-next-btn');
    if (nextChapter) {
      nextBtn.textContent = 'NAST\u0118PNY ROZDZIA\u0141 \u25B6';
      nextBtn.onclick = function() { hideGameOver(); showChapterIntro(nextChapter); };
    } else {
      nextBtn.textContent = '\uD83C\uDF89 KONIEC KAMPANII!';
      nextBtn.onclick = function() { hideGameOver(); showScreen('lobby'); };
    }
  } else {
    campaignBtns.style.display = 'none';
  }

  if (!won && currentCampaignChapter) {
    var retryBtn = document.createElement('button');
    retryBtn.className = 'start-btn';
    retryBtn.textContent = '\uD83D\uDD04 Spr\u00F3buj ponownie';
    retryBtn.id = 'retry-btn-dynamic';
    retryBtn.style.marginTop = '4px';
    retryBtn.onclick = function() { hideGameOver(); showChapterIntro(currentCampaignChapter); };
    var inner = document.getElementById('goc-inner');
    inner.insertBefore(retryBtn, campaignBtns);
  }

  var goov = document.getElementById('goov');
  goov.className = won ? 'win-bg' : 'lose-bg';
  goov.style.display = 'flex';
}

function hideGameOver() {
  document.getElementById('goov').style.display = 'none';
}

function restartLobby() {
  hideGameOver();
  G = { phase:"waiting", players:{}, playerOrder:[], activePlayer:"", turn:1, winner:null, log:"" };
  currentCampaignChapter = null;
  cancelModes();
  showScreen('lobby');
}

// ======================================================================
// CANVAS ARROW
// ======================================================================
function setupCanvas() {
  var cv = document.getElementById('ac');
  var bf = document.getElementById('board');
  if (!cv || !bf) return;
  function resize() { if (bf.offsetWidth>0) { cv.width=bf.offsetWidth; cv.height=bf.offsetHeight; } }
  resize();
  window.addEventListener('resize', function() { resize(); drawArrow(); });
}

function drawArrow() {
  var cv = document.getElementById('ac');
  if (!cv) return;
  var ctx = cv.getContext('2d');
  if (!cv.width || !cv.height) {
    var bf = document.getElementById('board');
    if (bf && bf.offsetWidth>0) { cv.width=bf.offsetWidth; cv.height=bf.offsetHeight; }
  }
  ctx.clearRect(0,0,cv.width,cv.height);
  if (!selAtk && !pendingSpell && !heroPowerMode && !healMode) return;
  var sx=dragStart.x, sy=dragStart.y, ex=dragCurrent.x, ey=dragCurrent.y;
  var color='#00ffff';
  ctx.beginPath(); ctx.arc(sx,sy,8,0,Math.PI*2); ctx.fillStyle=color+'88'; ctx.fill();
  ctx.beginPath(); ctx.arc(sx,sy,6,0,Math.PI*2); ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath(); ctx.arc(sx,sy,6,0,Math.PI*2); ctx.fillStyle=color; ctx.fill();
  if (Math.abs(ex-sx)<8 && Math.abs(ey-sy)<8) return;
  ctx.beginPath(); ctx.moveTo(sx,sy);
  ctx.quadraticCurveTo((sx+ex)/2,(sy+ey)/2-20,ex,ey);
  ctx.strokeStyle=color; ctx.lineWidth=3; ctx.setLineDash([6,4]); ctx.stroke(); ctx.setLineDash([]);
  var angle=Math.atan2(ey-((sy+ey)/2-20),ex-(sx+ex)/2), al=14;
  ctx.beginPath(); ctx.moveTo(ex,ey);
  ctx.lineTo(ex-al*Math.cos(angle-0.4),ey-al*Math.sin(angle-0.4));
  ctx.lineTo(ex-al*Math.cos(angle+0.4),ey-al*Math.sin(angle+0.4));
  ctx.closePath(); ctx.fillStyle=color; ctx.fill();
}

// ======================================================================
// ANIMATION
// ======================================================================
function findTargetElement(targetId) {
  if (targetId && typeof targetId === 'string' && targetId.indexOf('hero_') === 0) {
    return document.getElementById(targetId);
  }
  return document.querySelector('[data-uid="'+targetId+'"]');
}

function playAnimEvents(events) {
  var bf = document.getElementById('board');
  if (!bf || !events || !events.length) return;
  var delay = 0;
  events.forEach(function(ev) {
    if (ev.kind === 'attack_anim') {
      setTimeout(function() {
        var atk = findTargetElement(ev.attackerId);
        var tgt = findTargetElement(ev.targetId);
        if (!atk||!tgt) return;
        var ar=atk.getBoundingClientRect(), tr=tgt.getBoundingClientRect();
        var dx=(tr.left+tr.width/2-ar.left-ar.width/2)*0.4;
        var dy=(tr.top+tr.height/2-ar.top-ar.height/2)*0.4;
        atk.style.transition='transform 0.15s ease-in';
        atk.style.transform='translate('+dx+'px,'+dy+'px)';
        atk.style.zIndex='100';
        setTimeout(function() { atk.style.transition='transform 0.1s ease-out'; atk.style.transform=''; setTimeout(function(){atk.style.transition='';atk.style.zIndex='';},120); },160);
      }, delay);
      delay += 280;
    } else {
      setTimeout(function() {
        var target = findTargetElement(ev.targetId);
        if (!target) return;
        var tr=target.getBoundingClientRect(), br=bf.getBoundingClientRect();
        var x=tr.left-br.left+tr.width/2, y=tr.top-br.top+tr.height/2;
        var pop = document.createElement('div');
        pop.className = 'dmg-pop ' + (ev.kind==='heal'?'heal':'dmg');
        pop.textContent = (ev.kind==='heal'?'+':'-') + ev.amount;
        pop.style.left=(x-12)+'px'; pop.style.top=(y-16)+'px';
        bf.appendChild(pop); setTimeout(function(){pop.remove();},900);
        target.classList.add('atk-flash');
        setTimeout(function(){target.classList.remove('atk-flash');},250);
      }, delay);
      delay += 120;
    }
  });
}

// ======================================================================
// INIT
// ======================================================================
window.addEventListener('load', function() {
  initLobby();
  setupCanvas();

  document.addEventListener('mousemove', function(e) {
    if (!selAtk && !pendingSpell && !heroPowerMode && !healMode) return;
    var bf=document.getElementById('board');
    if (!bf) return;
    var r=bf.getBoundingClientRect();
    dragCurrent={x:e.clientX-r.left,y:e.clientY-r.top}; drawArrow();
  });
  document.addEventListener('touchmove', function(e) {
    if (!selAtk && !pendingSpell && !heroPowerMode && !healMode) return;
    var t=e.touches[0];
    var bf=document.getElementById('board');
    if (!bf) return;
    var r=bf.getBoundingClientRect();
    dragCurrent={x:t.clientX-r.left,y:t.clientY-r.top}; drawArrow();
  }, {passive:true});
  document.addEventListener('click', function(e) {
    var onBoard = e.target.closest('.minion-wrap') || e.target.closest('.hero-port') || e.target.closest('.my-hero-port') || e.target.closest('.hp-gem') || e.target.closest('.hand-card') || e.target.closest('.spell-overlay') || e.target.closest('.eot-btn');
    if ((selAtk||heroPowerMode||healMode||pendingSpell) && !onBoard) { cancelModes(); if(G && G.phase !== 'waiting') render(); }
  });
});
</script>
